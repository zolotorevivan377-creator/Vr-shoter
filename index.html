<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Dungeon Cleaner</title>
    <meta name="description" content="Randomly Generated VR Shooter">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene seth-game-logic>
      <a-assets>
        <a-mixin id="wall" geometry="primitive: box; width: 4; height: 4; depth: 4" material="color: #444; roughness: 0.8"></a-mixin>
        <a-mixin id="bullet" geometry="primitive: sphere; radius: 0.1" material="color: #ff0; emissive: #ff0"></a-mixin>
      </a-assets>

      <a-sky color="#111"></a-sky>
      <a-plane rotation="-90 0 0" width="100" height="100" color="#222"></a-plane>

      <a-entity id="rig" position="0 0 0">
        <a-camera id="camera" look-controls wasd-controls position="0 1.6 0">
          <a-cursor color="red" fuse="false" raycaster="objects: .nothing"></a-cursor>
          <a-text id="ui-text" value="Clear the zone!" position="0 0.5 -1" align="center" width="2" color="#fff"></a-text>
        </a-camera>
        
        <a-entity id="right-hand" oculus-touch-controls="hand: right" shooter-controls></a-entity>
        <a-entity id="left-hand" oculus-touch-controls="hand: left"></a-entity>
      </a-entity>

      <a-entity id="level-container"></a-entity>

    </a-scene>

    <script>
      // 1. Компонент логики игры (Генерация уровней)
      AFRAME.registerComponent('seth-game-logic', {
        init: function () {
          this.level = 1;
          this.enemiesCount = 0;
          this.generateLevel();
          
          this.el.addEventListener('enemy-down', () => {
            this.enemiesCount--;
            this.updateUI();
            if (this.enemiesCount <= 0) {
              this.nextLevel();
            }
          });
        },

        generateLevel: function () {
          const container = document.querySelector('#level-container');
          container.innerHTML = ''; // Очистка старого уровня
          this.enemiesCount = 0;

          const size = 5 + this.level; // Размер лабиринта растет с уровнем
          const spacing = 4;

          // Генерация стен и врагов
          for (let x = -size; x < size; x++) {
            for (let z = -size; z < size; z++) {
              // Шанс появления стены (кроме центральной зоны)
              if (Math.random() > 0.8 && (Math.abs(x) > 1 || Math.abs(z) > 1)) {
                let wall = document.createElement('a-entity');
                wall.setAttribute('mixin', 'wall');
                wall.setAttribute('position', `${x * spacing} 2 ${z * spacing}`);
                container.appendChild(wall);
              } 
              // Шанс появления врага
              else if (Math.random() > 0.93 && (Math.abs(x) > 2 || Math.abs(z) > 2)) {
                this.createEnemy(x * spacing, 1.5, z * spacing);
                this.enemiesCount++;
              }
            }
          }
          this.updateUI(`Level ${this.level}: Destroy ${this.enemiesCount} drones`);
        },

        createEnemy: function (x, y, z) {
          const enemy = document.createElement('a-entity');
          enemy.setAttribute('geometry', 'primitive: octahedron; radius: 0.5');
          enemy.setAttribute('material', 'color: #f00; wireframe: false');
          enemy.setAttribute('position', `${x} ${y} ${z}`);
          enemy.setAttribute('class', 'enemy');
          enemy.classList.add('collidable');
          
          // Анимация врага
          enemy.setAttribute('animation', `property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear`);
          
          document.querySelector('#level-container').appendChild(enemy);
        },

        updateUI: function (msg) {
          const text = document.querySelector('#ui-text');
          if (msg) text.setAttribute('value', msg);
          else text.setAttribute('value', `Enemies left: ${this.enemiesCount}`);
        },

        nextLevel: function () {
          this.level++;
          this.updateUI("LEVEL CLEAR! Next one in 3s...");
          setTimeout(() => {
            this.generateLevel();
          }, 3000);
        }
      });

      // 2. Компонент стрельбы
      AFRAME.registerComponent('shooter-controls', {
        init: function () {
          this.el.addEventListener('triggerdown', () => {
            this.shoot();
          });
        },

        shoot: function () {
          const bullet = document.createElement('a-entity');
          bullet.setAttribute('mixin', 'bullet');
          
          // Получаем позицию и направление контроллера
          const position = this.el.object3D.position;
          const direction = new THREE.Vector3(0, 0, -1);
          direction.applyQuaternion(this.el.object3D.quaternion);

          bullet.setAttribute('position', position);
          document.querySelector('a-scene').appendChild(bullet);

          // Полет пули
          const speed = 20;
          let distanceTravelled = 0;

          const interval = setInterval(() => {
            const currentPos = bullet.getAttribute('position');
            bullet.setAttribute('position', {
              x: currentPos.x + direction.x * 0.2,
              y: currentPos.y + direction.y * 0.2,
              z: currentPos.z + direction.z * 0.2
            });

            distanceTravelled += 0.2;

            // Проверка коллизий вручную (простой метод)
            const enemies = document.querySelectorAll('.enemy');
            enemies.forEach(enemy => {
              const enemyPos = enemy.object3D.position;
              const dist = bullet.object3D.position.distanceTo(enemyPos);
              if (dist < 0.6) {
                enemy.parentNode.removeChild(enemy);
                bullet.parentNode.removeChild(bullet);
                clearInterval(interval);
                this.el.emit('enemy-down');
              }
            });

            if (distanceTravelled > 30) {
              if (bullet.parentNode) bullet.parentNode.removeChild(bullet);
              clearInterval(interval);
            }
          }, 10);
        }
      });
    </script>
  </body>
</html>
