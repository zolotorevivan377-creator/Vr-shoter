<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Procedural Shooter - Meta Quest</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <script>
      // Компонент логики игры
      AFRAME.registerComponent('game-manager', {
        init: function () {
          this.level = 1;
          this.enemiesCount = 0;
          this.el.addEventListener('enemy-down', () => {
            this.enemiesCount--;
            if (this.enemiesCount <= 0) {
              this.nextLevel();
            }
          });
          this.startLevel();
        },

        startLevel: function () {
          console.log("Starting Level: " + this.level);
          const mapContainer = document.querySelector('#map');
          mapContainer.innerHTML = ''; // Очистка старой карты
          
          // Генерация лабиринта 10x10
          this.generateMap(10, 10);
          
          // Уведомление игрока
          this.showLevelText();
          this.el.emit('play-sound', {type: 'start'});
        },

        generateMap: function (width, depth) {
          const mapContainer = document.querySelector('#map');
          this.enemiesCount = 0;

          for (let x = 0; x < width; x++) {
            for (let z = 0; z < depth; z++) {
              // Случайные стены (30% шанс)
              if (Math.random() > 0.7 && (x !== 0 || z !== 0)) {
                let wall = document.createElement('a-box');
                wall.setAttribute('position', `${x * 4} 1.5 ${z * -4}`);
                wall.setAttribute('width', 4);
                wall.setAttribute('height', 3);
                wall.setAttribute('depth', 4);
                wall.setAttribute('color', '#444');
                wall.setAttribute('static-body', '');
                mapContainer.appendChild(wall);
              } 
              // Случайные враги (10% шанс)
              else if (Math.random() > 0.9 && (x !== 0 || z !== 0)) {
                this.spawnEnemy(x * 4, z * -4);
              }
            }
          }
          // Если врагов не создалось случайно, ставим одного гарантированно
          if(this.enemiesCount === 0) this.spawnEnemy(4, -4);
        },

        spawnEnemy: function (x, z) {
          this.enemiesCount++;
          const enemy = document.createElement('a-entity');
          enemy.setAttribute('enemy', '');
          enemy.setAttribute('position', `${x} 1 ${z}`);
          document.querySelector('#map').appendChild(enemy);
        },

        nextLevel: function () {
          this.level++;
          this.el.emit('play-sound', {type: 'win'});
          setTimeout(() => this.startLevel(), 2000);
        },

        showLevelText: function() {
            const txt = document.querySelector('#ui-text');
            txt.setAttribute('value', `LEVEL ${this.level}\nClear all enemies!`);
            setTimeout(() => txt.setAttribute('value', ''), 3000);
        }
      });

      // Компонент врага
      AFRAME.registerComponent('enemy', {
        init: function () {
          this.el.setAttribute('geometry', {primitive: 'sphere', radius: 0.6});
          this.el.setAttribute('material', {color: 'red', emissive: 'red'});
          this.el.setAttribute('class', 'target');
        },
        die: function() {
          this.el.sceneEl.emit('enemy-down');
          this.el.parentNode.removeChild(this.el);
        }
      });

      // Компонент стрельбы
      AFRAME.registerComponent('shooter', {
        init: function () {
          this.el.addEventListener('triggerdown', () => {
            this.shoot();
          });
        },
        shoot: function () {
          // Звук выстрела
          this.el.emit('play-sound', {type: 'shoot'});
          
          const raycaster = this.el.components.raycaster;
          const intersection = raycaster.getIntersection(document.querySelectorAll('.target'));
          
          if (intersection) {
            intersection.object.el.components.enemy.die();
          }
        }
      });
    </script>

    <a-scene game-manager renderer="antialias: true">
      <a-assets>
        <audio id="snd-shoot" src="https://cdn.aframe.io/360-video-example/gu-drum.mp3"></audio>
      </a-assets>

      <a-sky color="#111"></a-sky>
      <a-ambient-light intensity="0.5"></a-ambient-light>
      <a-point-light position="2 4 4" intensity="0.8"></a-point-light>

      <a-text id="ui-text" value="GET READY" position="0 2 -3" align="center" color="yellow" width="6"></a-text>

      <a-entity id="rig" movement-controls="controls: gamepad, keyboard">
        <a-entity camera position="0 1.6 0" look-controls></a-entity>
        
        <a-entity id="rightHand" 
                  laser-controls="hand: right" 
                  raycaster="objects: .target; far: 50; showLine: true"
                  line="color: red; opacity: 0.5"
                  shooter>
        </a-entity>
        
        <a-entity oculus-touch-controls="hand: left"></a-entity>
      </a-entity>

      <a-entity id="map"></a-entity>

      <a-grid static-body position="0 0 0" cell-size="2" section-size="10" color="#222"></a-grid>
      
    </a-scene>

    <script>
      // Простой обработчик звуков (имитация)
      const scene = document.querySelector('a-scene');
      scene.addEventListener('play-sound', (e) => {
        // В реальном проекте здесь используется <a-sound>
        console.log("Sound Effect: " + e.detail.type);
      });
    </script>
  </body>
</html>
