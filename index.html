<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Procedural Shooter - Meta Quest</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>

    <script>
      // Компонент игровой логики
      AFRAME.registerComponent('game-manager', {
        init: function () {
          this.level = 1;
          this.enemiesToKill = 0;
          this.sceneEl = this.el;
          
          // Слушаем выстрелы
          this.el.addEventListener('triggerdown', (e) => this.shoot(e));
          
          // Запуск первого уровня
          this.startLevel();
        },

        startLevel: function() {
          const levelText = document.querySelector('#level-ui');
          levelText.setAttribute('value', `LEVEL ${this.level}\nClear all targets!`);
          
          // Очистка старых объектов
          this.clearLevel();
          
          // Генерация лабиринта и врагов
          this.generateMap();
          
          // Звук нового уровня
          this.playSound('level-start-sound');
          
          // Убираем надпись через 3 секунды
          setTimeout(() => levelText.setAttribute('value', ''), 3000);
        },

        clearLevel: function() {
          const entities = document.querySelectorAll('.generated');
          entities.forEach(e => e.parentNode.removeChild(e));
        },

        generateMap: function() {
          const mapSize = 20 + (this.level * 2); // Карта растет с уровнем
          this.enemiesToKill = 3 + this.level;
          
          // Создаем врагов
          for (let i = 0; i < this.enemiesToKill; i++) {
            let enemy = document.createElement('a-box');
            enemy.setAttribute('class', 'enemy generated');
            enemy.setAttribute('color', '#FF4444');
            enemy.setAttribute('width', '0.8');
            enemy.setAttribute('height', '1.5');
            enemy.setAttribute('depth', '0.8');
            
            let x = (Math.random() - 0.5) * mapSize;
            let z = (Math.random() - 0.5) * mapSize;
            enemy.setAttribute('position', {x: x, y: 0.75, z: z});
            
            // Простая анимация "парения"
            enemy.setAttribute('animation', 'property: position; dir: alternate; dur: 1000; loop: true; to: ' + x + ' 1 ' + z);
            
            this.sceneEl.appendChild(enemy);
          }

          // Создаем случайные препятствия (стены)
          for (let i = 0; i < 15; i++) {
            let wall = document.createElement('a-box');
            wall.setAttribute('class', 'generated');
            wall.setAttribute('color', '#444');
            wall.setAttribute('width', '3');
            wall.setAttribute('height', '4');
            wall.setAttribute('depth', '0.5');
            
            let x = (Math.random() - 0.5) * mapSize;
            let z = (Math.random() - 0.5) * mapSize;
            wall.setAttribute('position', {x: x, y: 2, z: z});
            wall.setAttribute('rotation', {x: 0, y: Math.random() * 360, z: 0});
            
            this.sceneEl.appendChild(wall);
          }
        },

        shoot: function(event) {
          // Звук выстрела
          this.playSound('shoot-sound');

          // Получаем направление контроллера
          const controller = event.target;
          const raycaster = controller.components.raycaster;
          if (!raycaster) return;

          const intersections = raycaster.getIntersection();
          const target = intersections.find(i => i.object.el.classList.contains('enemy'));

          if (target) {
            this.killEnemy(target.object.el);
          }
        },

        killEnemy: function(el) {
          this.playSound('hit-sound');
          el.parentNode.removeChild(el);
          this.enemiesToKill--;

          if (this.enemiesToKill <= 0) {
            this.level++;
            this.startLevel();
          }
        },

        playSound: function(id) {
          const sound = document.querySelector(`#${id}`);
          if (sound && sound.components.sound) {
            sound.components.sound.stopSound();
            sound.components.sound.playSound();
          }
        }
      });
    </script>

    <a-scene game-manager physics="debug: false">
      <a-assets>
        <audio id="shot-src" src="https://cdn.freesound.org/previews/511/511414_11128544-lq.mp3"></audio>
        <audio id="hit-src" src="https://cdn.freesound.org/previews/142/142608_1840739-lq.mp3"></audio>
        <audio id="win-src" src="https://cdn.freesound.org/previews/274/274180_4486188-lq.mp3"></audio>
      </a-assets>

      <a-entity environment="preset: tron; seeding: 5"></a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-text id="level-ui" value="GET READY!" position="0 0 -2" align="center" color="#FFF" width="4"></a-text>
        <a-cursor fuse="false" raycaster="objects: .enemy" color="#FF0000"></a-cursor>
      </a-entity>

      <a-entity id="leftHand" laser-controls="hand: left" raycaster="objects: .enemy; far: 50"></a-entity>
      <a-entity id="rightHand" laser-controls="hand: right" raycaster="objects: .enemy; far: 50"></a-entity>

      <a-entity id="shoot-sound" sound="src: #shot-src; poolSize: 5"></a-entity>
      <a-entity id="hit-sound" sound="src: #hit-src; poolSize: 5"></a-entity>
      <a-entity id="level-start-sound" sound="src: #win-src; poolSize: 1"></a-entity>

      <a-plane rotation="-90 0 0" width="100" height="100" visible="false" static-body></a-plane>
    </a-scene>
  </body>
</html>
