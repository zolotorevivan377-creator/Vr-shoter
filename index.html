<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Quest Shooter Fixed — Level Gen</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <script>
      // ============================================================
      // ГЛОБАЛЬНЫЕ ЗВУКОВЫЕ СИСТЕМЫ (Web Audio API для скорости)
      // Мы загружаем звуки заранее, чтобы они играли без задержек.
      // ============================================================
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      let shotBuffer, dieBuffer;

      async function loadSound(url) {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        return await audioCtx.decodeAudioData(arrayBuffer);
      }

      function playSound(buffer) {
        if (!buffer || audioCtx.state === 'suspended') return;
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start(0);
      }

      // Загрузка звуков с CDN (public domain)
      loadSound('https://cdn.aframe.io/basic-guide/audio/pew.wav').then(buf => shotBuffer = buf);
      loadSound('https://cdn.aframe.io/360-video/click.mp3').then(buf => dieBuffer = buf);


      // ============================================================
      // КОМПОНЕНТЫ ЛОГИКИ ИГРЫ
      // ============================================================

      // Менеджер игры: генерация уровней и проверка победы
      AFRAME.registerComponent('game-manager', {
        init: function () {
          this.level = 1;
          this.enemiesCount = 0;
          this.el.addEventListener('enemy-down', () => {
            this.enemiesCount--;
            if (this.enemiesCount <= 0) {
              this.nextLevel();
            }
          });
          // Генерируем первый уровень
          this.generateLevel();
        },

        generateLevel: function () {
          const scene = this.el;
          
          // 1. Очистка старых объектов
          const oldEntities = document.querySelectorAll('.level-obj');
          oldEntities.forEach(e => e.parentNode.removeChild(e));

          // 2. Сброс позиции игрока в центр
          document.querySelector('#rig').setAttribute('position', '0 0 0');

          // 3. Установка сложности (больше врагов с каждым уровнем)
          this.enemiesCount = 2 + this.level;
          
          // 4. Генерация препятствий (стен) в зоне 20x20 метров
          for (let i = 0; i < 12; i++) {
            let wall = document.createElement('a-box');
            wall.setAttribute('class', 'level-obj static');
            wall.setAttribute('position', `${(Math.random()-0.5)*20} 1.5 ${(Math.random()-0.5)*20}`);
            wall.setAttribute('width', Math.random()*2 + 1);
            wall.setAttribute('height', Math.random()*2 + 1);
            wall.setAttribute('depth', '0.5');
            wall.setAttribute('material', 'color', '#444; metalness: 0.6; roughness: 0.2');
            scene.appendChild(wall);
          }

          // 5. Генерация врагов
          // Враги — красные шары, они "враждебные объекты" (target)
          for (let i = 0; i < this.enemiesCount; i++) {
            let enemy = document.createElement('a-sphere');
            enemy.setAttribute('class', 'level-obj target');
            enemy.setAttribute('position', `${(Math.random()-0.5)*25} 1.5 ${-10 - Math.random()*15}`);
            enemy.setAttribute('radius', '0.7');
            enemy.setAttribute('material', 'color: #FF1111; emissive: #FF0000; emissiveIntensity: 0.5');
            
            // Враги реагируют на клик (триггер лазера)
            enemy.setAttribute('enemy-logic', ''); 
            scene.appendChild(enemy);
          }
          
          console.log(`Level ${this.level} started. Enemies: ${this.enemiesCount}`);
        },

        nextLevel: function () {
          this.level++;
          // Визуальное уведомление
          let msg = document.querySelector('#level-msg');
          msg.setAttribute('value', `LEVEL ${this.level-1} CLEAR!\nLOADING LEVEL ${this.level}...`);
          msg.setAttribute('visible', 'true');
          
          // Небольшая задержка перед следующим уровнем
          setTimeout(() => {
            msg.setAttribute('visible', 'false');
            this.generateLevel();
          }, 3000);
        }
      });

      // Логика врага: получение урона
      AFRAME.registerComponent('enemy-logic', {
        init: function () {
          // Слушаем событие click, которое посылает laser-controls
          this.el.addEventListener('click', (evt) => {
            this.die();
          });
        },
        die: function() {
          // Звук смерти
          playSound(dieBuffer);
          this.el.sceneEl.emit('enemy-down'); // Сообщаем менеджеру
          this.el.parentNode.removeChild(this.el); // Удаляем врага
        }
      });

      // КОМПОНЕНТ СТРЕЛЬБЫ ДЛЯ КОНТРОЛЛЕРА
      AFRAME.registerComponent('shooter-controller', {
        init: function () {
          // Слушаем нажатие курка на этом контроллере
          this.el.addEventListener('triggerdown', () => {
            // 1. Звук выстрела
            playSound(shotBuffer);
            
            // 2. Визуальный отклик контроллера (вибрация)
            if (this.el.components['oculus-touch-controls']) {
              this.el.components['oculus-touch-controls'].pulse(0.8, 100);
            }
          });
        }
      });
    </script>
  </head>
  <body>

    <a-scene game-manager renderer="colorManagement: true;">
      
      <a-assets></a-assets>

      <a-entity environment="preset: contact; dressingAmount: 15; shadow: true"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-camera position="0 1.6 0" look-controls>
           <a-text id="level-msg" value="" align="center" position="0 0.5 -2" scale="1 1 1" visible="false" color="#FFD700" background="color: #000; opacity: 0.5"></a-text>
        </a-camera>

        <a-entity id="leftHand" 
                  oculus-touch-controls="hand: left" 
                  wasd-controls="acceleration: 20">
            <a-box scale="0.1 0.1 0.2" material="color: #333"></a-box>
        </a-entity>
        
        <a-entity id="rightHand" 
                  oculus-touch-controls="hand: right"
                  laser-controls="hand: right"
                  raycaster="objects: .target; far: 100; showLine: true"
                  line="color: #44FF44; opacity: 0.8"
                  shooter-controller>
            <a-cylinder rotation="90 0 0" position="0 0 -0.1" radius="0.02" height="0.2" color="#111"></a-cylinder>
        </a-entity>
      </a-entity>

      <a-light type="ambient" intensity="0.6"></a-light>
      <a-light type="directional" position="1 4 3" intensity="0.8" castShadow="true"></a-light>

    </a-scene>
  </body>
</html>
