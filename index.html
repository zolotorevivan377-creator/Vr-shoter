<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR WebXR Shooter — Random Levels</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>

    <script>
      // Компонент логики игры: генерация уровней и проверка врагов
      AFRAME.registerComponent('game-manager', {
        init: function () {
          this.level = 1;
          this.enemiesCount = 0;
          this.el.addEventListener('enemy-down', () => {
            this.enemiesCount--;
            if (this.enemiesCount <= 0) {
              this.nextLevel();
            }
          });
          this.generateLevel();
        },

        generateLevel: function () {
          const scene = this.el;
          // Очистка старых врагов и стен
          const oldEntities = document.querySelectorAll('.level-obj');
          oldEntities.forEach(e => e.parentNode.removeChild(e));

          // Настройка сложности
          this.enemiesCount = 3 + this.level;
          
          // Создание стен (рандомно)
          for (let i = 0; i < 10; i++) {
            let wall = document.createElement('a-box');
            wall.setAttribute('class', 'level-obj');
            wall.setAttribute('position', `${(Math.random()-0.5)*20} 1.5 ${(Math.random()-0.5)*20}`);
            wall.setAttribute('width', '3');
            wall.setAttribute('height', '3');
            wall.setAttribute('depth', '0.5');
            wall.setAttribute('color', '#444');
            wall.setAttribute('static-body', '');
            scene.appendChild(wall);
          }

          // Создание врагов
          for (let i = 0; i < this.enemiesCount; i++) {
            let enemy = document.createElement('a-sphere');
            enemy.setAttribute('class', 'level-obj enemy');
            enemy.setAttribute('position', `${(Math.random()-0.5)*25} 1.5 ${-10 - Math.random()*15}`);
            enemy.setAttribute('radius', '0.7');
            enemy.setAttribute('color', '#FF4B4B');
            enemy.setAttribute('enemy-logic', '');
            scene.appendChild(enemy);
          }

          // Звук нового уровня
          if(this.el.components.sound) this.el.components.sound.playSound();
          
          console.log("Level " + this.level + " started!");
        },

        nextLevel: function () {
          this.level++;
          // Визуальное уведомление
          let msg = document.querySelector('#level-msg');
          msg.setAttribute('value', 'LEVEL COMPLETE! LOADING NEXT...');
          msg.setAttribute('visible', 'true');
          
          setTimeout(() => {
            msg.setAttribute('visible', 'false');
            this.generateLevel();
          }, 2000);
        }
      });

      // Логика врага: получение урона
      AFRAME.registerComponent('enemy-logic', {
        init: function () {
          this.el.addEventListener('click', () => {
            this.die();
          });
        },
        die: function() {
          this.el.sceneEl.emit('enemy-down');
          this.el.parentNode.removeChild(this.el);
          // Звук взрыва/смерти
          document.querySelector('#sfx-die').components.sound.playSound();
        }
      });

      // Стрельба (для контроллеров Quest)
      AFRAME.registerComponent('shooter', {
        init: function () {
          this.el.addEventListener('triggerdown', () => {
            document.querySelector('#sfx-shot').components.sound.playSound();
            // Простейший Raycaster (луч) для фиксации попадания
            let raycaster = this.el.components.raycaster;
            let intersection = raycaster.getIntersection(document.querySelector('.enemy'));
            if (intersection) {
               intersection.object.el.emit('click');
            }
          });
        }
      });
    </script>

    <a-scene game-manager physics="debug: false" 
             sound="src: url(https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav); autoplay: true; loop: true; volume: 0.2">
      
      <a-entity id="sfx-shot" sound="src: url(https://actions.google.com/sounds/v1/weapons/firearm_shotgun.ogg); volume: 0.5"></a-entity>
      <a-entity id="sfx-die" sound="src: url(https://actions.google.com/sounds/v1/science_fiction/low_fuzz.ogg); volume: 0.8"></a-entity>
      
      <a-assets>
        </a-assets>

      <a-entity environment="preset: tron; dressingAmount: 20; shadow: true"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-camera position="0 1.6 0">
           <a-text id="level-msg" value="" align="center" position="0 0 -1" scale="0.5 0.5 0.5" visible="false" color="#FFD700"></a-text>
        </a-camera>

        <a-entity id="rightHand" 
                  laser-controls="hand: right" 
                  raycaster="objects: .enemy; showLine: true; far: 50" 
                  line="color: red; opacity: 0.5"
                  shooter>
            <a-box position="0 0 -0.15" scale="0.05 0.05 0.3" color="#222"></a-box>
        </a-entity>
        
        <a-entity id="leftHand" oculus-touch-controls="hand: left"></a-entity>
      </a-entity>

      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="directional" position="1 4 3" intensity="0.8"></a-light>

    </a-scene>
  </body>
</html>
