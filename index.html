<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Quest Shooter: Fixed 3.0</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>
<body>
    <a-scene background="color: #111">
        <a-assets>
            <a-mixin id="bullet" geometry="primitive: sphere; radius: 0.05" material="color: yellow; shader: flat"></a-mixin>
            <a-mixin id="en-bullet" geometry="primitive: sphere; radius: 0.1" material="color: #ff6600; shader: flat"></a-mixin>
        </a-assets>

        <a-entity environment="preset: logic; dressingAmount: 0; groundColor: #222; grid: cross; skyType: gradient"></a-entity>
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 4 1" intensity="0.5"></a-light>

        <a-entity id="rig" movement-controls="speed: 0.15">
            <a-camera id="camera" look-controls position="0 1.6 0">
                <a-text id="hud" value="PRESS TRIGGER TO START" position="0 -0.5 -1.2" scale="0.5 0.5 0.5" align="center" color="#00FF00"></a-text>
                
                <a-entity id="menu" position="0 0.2 -1.5">
                    <a-text value="VR SHOOTER\n\nUse Left Stick to Move\nRight Trigger to Shoot" align="center" width="4"></a-text>
                </a-entity>
            </a-camera>

            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity id="rightHand" oculus-touch-controls="hand: right" shooter-logic></a-entity>
        </a-entity>

        <a-entity id="enemies-group"></a-entity>
        <a-entity id="bullets-group"></a-entity>
    </a-scene>

    <script>
        let game = { active: false, hp: 100, lvl: 1, enemies: 0 };
        
        // Аудио-движок (работает без файлов)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        AFRAME.registerComponent('shooter-logic', {
            init: function () {
                this.el.addEventListener('triggerdown', () => {
                    if (!game.active) startGame();
                    else this.shoot();
                });
            },
            shoot: function () {
                playSound(400, 'square', 0.1); // Звук выстрела
                const b = document.createElement('a-entity');
                b.setAttribute('mixin', 'bullet');
                const pos = new THREE.Vector3();
                this.el.object3D.getWorldPosition(pos);
                const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.el.object3D.getWorldQuaternion(new THREE.Quaternion()));
                
                b.setAttribute('position', pos);
                b.setAttribute('move-bullet', { dx: dir.x, dy: dir.y, dz: dir.z, isEn: false });
                document.querySelector('#bullets-group').appendChild(b);

                const gp = this.el.components['oculus-touch-controls'].gamepad;
                if (gp && gp.hapticActuators) gp.hapticActuators[0].pulse(0.5, 50);
            }
        });

        AFRAME.registerComponent('move-bullet', {
            schema: { dx: {type:'number'}, dy: {type:'number'}, dz: {type:'number'}, speed: {default: 0.5}, isEn: {default: false} },
            tick: function () {
                let p = this.el.getAttribute('position');
                p.x += this.data.dx * this.data.speed;
                p.y += this.data.dy * this.data.speed;
                p.z += this.data.dz * this.data.speed;
                this.el.setAttribute('position', p);

                if (!this.data.isEn) {
                    document.querySelectorAll('.enemy').forEach(en => {
                        let ep = en.getAttribute('position');
                        if (new THREE.Vector3(p.x, p.y, p.z).distanceTo(ep) < 0.8) {
                            en.parentNode.removeChild(en);
                            if(this.el.parentNode) this.el.parentNode.removeChild(this.el);
                            game.enemies--;
                            updateHUD();
                            if(game.enemies <= 0) nextLevel();
                        }
                    });
                } else {
                    let pp = document.querySelector('#camera').object3D.position;
                    if (new THREE.Vector3(p.x, p.y, p.z).distanceTo(pp) < 0.5) {
                        hitPlayer();
                        if(this.el.parentNode) this.el.parentNode.removeChild(this.el);
                    }
                }
                if (Math.abs(p.z) > 40) this.el.parentNode && this.el.parentNode.removeChild(this.el);
            }
        });

        AFRAME.registerComponent('enemy-behavior', {
            schema: { type: {default: 'chaser'}, lastShoot: {default: 0} },
            tick: function (time) {
                if (!game.active) return;
                let pp = document.querySelector('#camera').object3D.position;
                let ep = this.el.object3D.position;
                let dist = new THREE.Vector3(ep.x, 0, ep.z).distanceTo(new THREE.Vector3(pp.x, 0, pp.z));

                if (this.data.type === 'chaser') {
                    let angle = Math.atan2(pp.x - ep.x, pp.z - ep.z);
                    ep.x += Math.sin(angle) * 0.03;
                    ep.z += Math.cos(angle) * 0.03;
                    if (dist < 1) hitPlayer(0.2); 
                } else {
                    if (dist > 7) {
                        let angle = Math.atan2(pp.x - ep.x, pp.z - ep.z);
                        ep.x += Math.sin(angle) * 0.02;
                        ep.z += Math.cos(angle) * 0.02;
                    } else if (time - this.data.lastShoot > 3000) {
                        this.fire(pp, ep);
                        this.data.lastShoot = time;
                    }
                }
                this.el.setAttribute('position', ep);
            },
            fire: function(pp, ep) {
                let eb = document.createElement('a-entity');
                eb.setAttribute('mixin', 'en-bullet');
                let dir = new THREE.Vector3().subVectors(pp, ep).normalize();
                eb.setAttribute('position', {x: ep.x, y: 1.2, z: ep.z});
                eb.setAttribute('move-bullet', { dx: dir.x, dy: dir.y, dz: dir.z, speed: 0.15, isEn: true });
                document.querySelector('#bullets-group').appendChild(eb);
            }
        });

        function hitPlayer(amt = 10) {
            if (!game.active) return;
            game.hp -= amt;
            playSound(150, 'sawtooth', 0.1); // Звук боли
            updateHUD();
            if (game.hp <= 0) die();
        }

        function startGame() {
            game.active = true; game.hp = 100; game.lvl = 1;
            document.querySelector('#menu').setAttribute('visible', false);
            spawn();
        }

        function spawn() {
            let container = document.querySelector('#enemies-group');
            container.innerHTML = '';
            game.enemies = 2 + game.lvl;
            for (let i = 0; i < game.enemies; i++) {
                let en = document.createElement('a-entity');
                en.classList.add('enemy');
                let isS = Math.random() > 0.5;
                en.setAttribute('geometry', {primitive: isS ? 'box' : 'cone', height: 1.5, radiusBottom: 0.5});
                en.setAttribute('material', {color: isS ? 'blue' : 'red'});
                let a = Math.random() * Math.PI * 2;
                let d = 12 + Math.random() * 5;
                en.setAttribute('position', {x: Math.sin(a)*d, y: 0.75, z: Math.cos(a)*d});
                en.setAttribute('enemy-behavior', {type: isS ? 'shooter' : 'chaser'});
                container.appendChild(en);
            }
            updateHUD();
        }

        function nextLevel() {
            game.lvl++;
            game.hp = Math.min(game.hp + 25, 100);
            spawn();
        }

        function updateHUD() {
            document.querySelector('#hud').setAttribute('value', `HP: ${Math.ceil(game.hp)} | LVL: ${game.lvl} | ENEMIES: ${game.enemies}`);
        }

        function die() {
            game.active = false;
            document.querySelector('#enemies-group').innerHTML = '';
            document.querySelector('#menu').setAttribute('visible', true);
            document.querySelector('#hud').setAttribute('value', "GAME OVER - TRIGGER TO RESTART");
        }
    </script>
</body>
</html>
