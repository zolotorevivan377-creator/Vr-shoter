<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Quest Shooter: Battle Ready</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>
<body>
    <a-scene>
        <a-assets>
            <a-mixin id="bullet" geometry="primitive: sphere; radius: 0.07" material="color: #FFEF00; emissive: #FFEF00"></a-mixin>
            <a-mixin id="enemy-bullet" geometry="primitive: sphere; radius: 0.1" material="color: #FF4500; emissive: #FF4500"></a-mixin>
            <audio id="snd-shoot" src="https://cdn.aframe.io/360-video-example/guerrilla_sound_design_gun_shot.mp3" preload="auto"></audio>
            <audio id="snd-hit" src="https://cdn.aframe.io/examples/ar/models/reticle/reticle.mp3" preload="auto"></audio>
        </a-assets>

        <a-entity id="env" environment="preset: logic; dressingAmount: 20; ground: flat"></a-entity>

        <a-entity id="rig" movement-controls="speed: 0.15">
            <a-camera id="camera" look-controls position="0 1.6 0">
                <a-plane id="damage-flash" position="0 0 -0.1" width="2" height="2" material="color: red; opacity: 0" visible="false"></a-plane>
                
                <a-text id="hud" value="HP: 100 | LEVEL: 1" position="0 -0.4 -1" scale="0.4 0.4 0.4" align="center" color="#00FF00"></a-text>
                
                <a-entity id="menu" position="0 0 -1.2">
                    <a-plane color="#111" width="2" height="1" opacity="0.9">
                        <a-text id="menu-text" value="VR ROGUELIKE\n\n- Move: Left Stick\n- Shoot: Right Trigger\n\nClick Trigger to Start" align="center" width="3"></a-text>
                    </a-plane>
                </a-entity>
            </a-camera>

            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity id="rightHand" oculus-touch-controls="hand: right" shooter-controller>
                <a-box width="0.05" height="0.08" depth="0.2" position="0 0 -0.1" material="color: #444"></a-box>
            </a-entity>
        </a-entity>

        <a-entity id="enemies-container"></a-entity>
        <a-entity id="bullets-container"></a-entity>

        <a-entity id="global-snd-shoot" sound="src: #snd-shoot; poolSize: 5"></a-entity>
        <a-entity id="global-snd-hit" sound="src: #snd-hit; poolSize: 5; volume: 2"></a-entity>
    </a-scene>

    <script>
        let game = {
            active: false,
            hp: 100,
            level: 1,
            enemies: 0
        };

        AFRAME.registerComponent('shooter-controller', {
            init: function () {
                this.el.addEventListener('triggerdown', () => {
                    if (!game.active) startGame();
                    else this.shoot();
                });
            },
            shoot: function () {
                const bullet = document.createElement('a-entity');
                bullet.setAttribute('mixin', 'bullet');
                const pos = new THREE.Vector3();
                this.el.object3D.getWorldPosition(pos);
                const rot = new THREE.Quaternion();
                this.el.object3D.getWorldQuaternion(rot);
                const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(rot);

                bullet.setAttribute('position', pos);
                bullet.setAttribute('bullet-logic', { dirX: dir.x, dirY: dir.y, dirZ: dir.z });
                document.querySelector('#bullets-container').appendChild(bullet);
                
                document.querySelector('#global-snd-shoot').components.sound.stopSound();
                document.querySelector('#global-snd-shoot').components.sound.playSound();

                const gp = this.el.components['oculus-touch-controls'].gamepad;
                if (gp && gp.hapticActuators) gp.hapticActuators[0].pulse(0.5, 50);
            }
        });

        AFRAME.registerComponent('bullet-logic', {
            schema: { dirX: {type:'number'}, dirY: {type:'number'}, dirZ: {type:'number'}, speed: {default: 0.6}, isEnemy: {default: false} },
            tick: function () {
                let pos = this.el.getAttribute('position');
                pos.x += this.data.dirX * this.data.speed;
                pos.y += this.data.dirY * this.data.speed;
                pos.z += this.data.dirZ * this.data.speed;
                this.el.setAttribute('position', pos);

                if (!this.data.isEnemy) {
                    document.querySelectorAll('.enemy').forEach(en => {
                        const enPos = en.getAttribute('position');
                        if (new THREE.Vector3(pos.x, pos.y, pos.z).distanceTo(new THREE.Vector3(enPos.x, enPos.y, enPos.z)) < 0.7) {
                            en.parentNode.removeChild(en);
                            if(this.el.parentNode) this.el.parentNode.removeChild(this.el);
                            game.enemies--;
                            updateHUD();
                            if (game.enemies <= 0) nextLevel();
                        }
                    });
                } else {
                    const playerPos = document.querySelector('#camera').object3D.position;
                    if (new THREE.Vector3(pos.x, pos.y, pos.z).distanceTo(playerPos) < 0.4) {
                        takeDamage(10);
                        if(this.el.parentNode) this.el.parentNode.removeChild(this.el);
                    }
                }

                if (Math.abs(pos.z) > 40 || Math.abs(pos.x) > 40) {
                    if(this.el.parentNode) this.el.parentNode.removeChild(this.el);
                }
            }
        });

        AFRAME.registerComponent('enemy-ai', {
            schema: { type: {default: 'chaser'}, speed: {default: 0.02}, lastShoot: {default: 0} },
            tick: function (time) {
                const playerPos = document.querySelector('#camera').object3D.position;
                const enemyPos = this.el.object3D.position;
                const dist = new THREE.Vector3(enemyPos.x, 0, enemyPos.z).distanceTo(new THREE.Vector3(playerPos.x, 0, playerPos.z));

                if (this.data.type === 'chaser') {
                    const angle = Math.atan2(playerPos.x - enemyPos.x, playerPos.z - enemyPos.z);
                    enemyPos.x += Math.sin(angle) * this.data.speed;
                    enemyPos.z += Math.cos(angle) * this.data.speed;
                    if (dist < 0.8) takeDamage(0.5); // Урон от касания (постепенный)
                } else {
                    // Стрелок: держит дистанцию и стреляет
                    if (dist > 6) {
                        const angle = Math.atan2(playerPos.x - enemyPos.x, playerPos.z - enemyPos.z);
                        enemyPos.x += Math.sin(angle) * this.data.speed;
                        enemyPos.z += Math.cos(angle) * this.data.speed;
                    } else if (time - this.data.lastShoot > 2500) {
                        this.shootPlayer(playerPos, enemyPos);
                        this.data.lastShoot = time;
                    }
                }
                this.el.setAttribute('position', enemyPos);
            },
            shootPlayer: function(pPos, ePos) {
                const eb = document.createElement('a-entity');
                eb.setAttribute('mixin', 'enemy-bullet');
                const dir = new THREE.Vector3().subVectors(pPos, ePos).normalize();
                eb.setAttribute('position', {x: ePos.x, y: 1.2, z: ePos.z});
                eb.setAttribute('bullet-logic', { dirX: dir.x, dirY: dir.y, dirZ: dir.z, speed: 0.2, isEnemy: true });
                document.querySelector('#bullets-container').appendChild(eb);
            }
        });

        function takeDamage(amount) {
            if (!game.active) return;
            game.hp -= amount;
            updateHUD();
            
            // Визуальный эффект
            const flash = document.querySelector('#damage-flash');
            flash.setAttribute('visible', true);
            flash.setAttribute('material', 'opacity', 0.4);
            setTimeout(() => flash.setAttribute('material', 'opacity', 0), 100);
            
            document.querySelector('#global-snd-hit').components.sound.playSound();

            if (game.hp <= 0) gameOver();
        }

        function startGame() {
            game.active = true;
            game.hp = 100;
            game.level = 1;
            document.querySelector('#menu').setAttribute('visible', false);
            generateLevel();
        }

        function generateLevel() {
            const container = document.querySelector('#enemies-container');
            container.innerHTML = '';
            game.enemies = 3 + game.level;
            
            for (let i = 0; i < game.enemies; i++) {
                const en = document.createElement('a-entity');
                en.classList.add('enemy');
                const isShooter = Math.random() > 0.6;
                en.setAttribute('geometry', {primitive: 'cone', radiusBottom: 0.4, height: 1.5});
                en.setAttribute('material', {color: isShooter ? '#0077FF' : '#FF0000'});
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 15 + Math.random() * 5;
                en.setAttribute('position', { x: Math.sin(angle)*dist, y: 0.75, z: Math.cos(angle)*dist });
                en.setAttribute('enemy-ai', { type: isShooter ? 'shooter' : 'chaser', speed: 0.02 + (game.level*0.005) });
                container.appendChild(en);
            }
            updateHUD();
        }

        function nextLevel() {
            game.level++;
            game.hp = Math.min(game.hp + 20, 100); // Лечим при переходе
            generateLevel();
        }

        function updateHUD() {
            const hud = document.querySelector('#hud');
            hud.setAttribute('value', `HP: ${Math.ceil(game.hp)} | LEVEL: ${game.level} | ENEMIES: ${game.enemies}`);
            hud.setAttribute('color', game.hp < 30 ? 'red' : '#00FF00');
        }

        function gameOver() {
            game.active = false;
            document.querySelector('#enemies-container').innerHTML = '';
            document.querySelector('#menu').setAttribute('visible', true);
            document.querySelector('#menu-text').setAttribute('value', `GAME OVER\nLevel reached: ${game.level}\n\nPull Trigger to Restart`);
        }
    </script>
</body>
</html>
