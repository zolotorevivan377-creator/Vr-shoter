<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Quest Shooter: Full World</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>
<body>
    <a-scene background="color: #020210">
        <a-assets>
            <a-mixin id="bullet" geometry="primitive: sphere; radius: 0.05" material="color: #00ffff; shader: flat"></a-mixin>
            <a-mixin id="en-bullet" geometry="primitive: sphere; radius: 0.1" material="color: #ff6600; shader: flat"></a-mixin>
        </a-assets>

        <a-plane rotation="-90 0 0" width="100" height="100" material="src: url(https://cdn.aframe.io/a-blast/assets/images/floor.png); repeat: 50 50; color: #333"></a-plane>
        <a-sky color="#050515"></a-sky>
        <a-grid position="0 0.01 0" width="100" height="100" material="opacity: 0.2; color: #4CC3D9"></a-grid>

        <a-light type="ambient" color="#445" intensity="0.8"></a-light>
        <a-light type="directional" color="#fff" intensity="0.6" position="-1 2 1"></a-light>

        <a-entity id="rig" movement-controls="speed: 0.2">
            <a-camera id="camera" look-controls position="0 1.6 0">
                <a-text id="hud" value="TRIGGER TO START" position="0 -0.5 -1" scale="0.4 0.4 0.4" align="center" color="#00FF00"></a-text>
                <a-entity id="menu" position="0 0.2 -1.2">
                    <a-text value="VR SHOOTER\n\n- Move: Left Stick\n- Shoot: Right Trigger" align="center" width="3"></a-text>
                </a-entity>
            </a-camera>

            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity id="rightHand" oculus-touch-controls="hand: right" shooter-logic>
                <a-box width="0.05" height="0.05" depth="0.2" position="0 0 -0.1" material="color: #555"></a-box>
            </a-entity>
        </a-entity>

        <a-entity id="walls-group"></a-entity>
        <a-entity id="enemies-group"></a-entity>
        <a-entity id="bullets-group"></a-entity>
    </a-scene>

    <script>
        let game = { active: false, hp: 100, lvl: 1, enemies: 0 };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(f, t, d) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d);
            o.stop(audioCtx.currentTime + d);
        }

        AFRAME.registerComponent('shooter-logic', {
            init: function () {
                this.el.addEventListener('triggerdown', () => {
                    if (!game.active) startGame(); else this.shoot();
                });
            },
            shoot: function () {
                playSound(500, 'square', 0.1);
                const b = document.createElement('a-entity');
                b.setAttribute('mixin', 'bullet');
                const pos = new THREE.Vector3();
                this.el.object3D.getWorldPosition(pos);
                const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.el.object3D.getWorldQuaternion(new THREE.Quaternion()));
                b.setAttribute('position', pos);
                b.setAttribute('move-bullet', { dx: dir.x, dy: dir.y, dz: dir.z, isEn: false });
                document.querySelector('#bullets-group').appendChild(b);
            }
        });

        AFRAME.registerComponent('move-bullet', {
            schema: { dx: {type:'number'}, dy: {type:'number'}, dz: {type:'number'}, speed: {default: 0.6}, isEn: {default: false} },
            tick: function () {
                let p = this.el.getAttribute('position');
                p.x += this.data.dx * this.data.speed;
                p.y += this.data.dy * this.data.speed;
                p.z += this.data.dz * this.data.speed;
                this.el.setAttribute('position', p);

                // Коллизия с врагами
                if (!this.data.isEn) {
                    document.querySelectorAll('.enemy').forEach(en => {
                        if (new THREE.Vector3(p.x, p.y, p.z).distanceTo(en.object3D.position) < 0.7) {
                            en.parentNode.removeChild(en);
                            this.el.parentNode && this.el.parentNode.removeChild(this.el);
                            game.enemies--; updateHUD();
                            if(game.enemies <= 0) nextLevel();
                        }
                    });
                } else {
                    // Коллизия с игроком
                    if (new THREE.Vector3(p.x, p.y, p.z).distanceTo(document.querySelector('#camera').object3D.position) < 0.5) {
                        hitPlayer(10);
                        this.el.parentNode && this.el.parentNode.removeChild(this.el);
                    }
                }
                // Коллизия со стенами
                document.querySelectorAll('.wall').forEach(w => {
                    if (new THREE.Vector3(p.x, p.y, p.z).distanceTo(w.object3D.position) < 1.2) {
                        this.el.parentNode && this.el.parentNode.removeChild(this.el);
                    }
                });
                if (Math.abs(p.z) > 40) this.el.parentNode && this.el.parentNode.removeChild(this.el);
            }
        });

        AFRAME.registerComponent('enemy-ai', {
            schema: { type: {default: 'chaser'}, lastShoot: {default: 0} },
            tick: function (time) {
                if (!game.active) return;
                let pp = document.querySelector('#camera').object3D.position;
                let ep = this.el.object3D.position;
                let dist = new THREE.Vector3(ep.x, 0, ep.z).distanceTo(new THREE.Vector3(pp.x, 0, pp.z));

                let angle = Math.atan2(pp.x - ep.x, pp.z - ep.z);
                if (this.data.type === 'chaser') {
                    ep.x += Math.sin(angle) * 0.03; ep.z += Math.cos(angle) * 0.03;
                    if (dist < 1.1) hitPlayer(0.3);
                } else {
                    if (dist > 8) { ep.x += Math.sin(angle)*0.02; ep.z += Math.cos(angle)*0.02; }
                    else if (time - this.data.lastShoot > 2500) {
                        this.fire(pp, ep); this.data.lastShoot = time;
                    }
                }
                this.el.setAttribute('position', ep);
            },
            fire: function(pp, ep) {
                let eb = document.createElement('a-entity');
                eb.setAttribute('mixin', 'en-bullet');
                let dir = new THREE.Vector3().subVectors(pp, ep).normalize();
                eb.setAttribute('position', {x: ep.x, y: 1.2, z: ep.z});
                eb.setAttribute('move-bullet', { dx: dir.x, dy: dir.y, dz: dir.z, speed: 0.15, isEn: true });
                document.querySelector('#bullets-group').appendChild(eb);
            }
        });

        function hitPlayer(a) {
            game.hp -= a; playSound(100, 'sawtooth', 0.1); updateHUD();
            if (game.hp <= 0) die();
        }

        function startGame() {
            game.active = true; game.hp = 100; game.lvl = 1;
            document.querySelector('#menu').setAttribute('visible', false);
            generateMap();
        }

        function generateMap() {
            // Стены
            let wGrp = document.querySelector('#walls-group');
            wGrp.innerHTML = '';
            for(let i=0; i<15; i++) {
                let w = document.createElement('a-box');
                w.className = 'wall';
                w.setAttribute('width', 2); w.setAttribute('height', 4); w.setAttribute('depth', 2);
                w.setAttribute('position', {x: (Math.random()-0.5)*30, y: 2, z: (Math.random()-0.5)*30});
                w.setAttribute('material', 'color', '#445');
                // Не ставим стену на игрока
                if (w.object3D.position.length() > 5) wGrp.appendChild(w);
            }
            spawnEnemies();
        }

        function spawnEnemies() {
            let container = document.querySelector('#enemies-group');
            container.innerHTML = '';
            game.enemies = 3 + game.lvl;
            for (let i = 0; i < game.enemies; i++) {
                let en = document.createElement('a-entity');
                en.classList.add('enemy');
                let isS = Math.random() > 0.5;
                en.setAttribute('geometry', {primitive: isS ? 'box' : 'cone', height: 1.5});
                en.setAttribute('material', {color: isS ? '#33f' : '#f33'});
                let a = Math.random() * Math.PI * 2;
                let d = 15 + Math.random() * 5;
                en.setAttribute('position', {x: Math.sin(a)*d, y: 0.75, z: Math.cos(a)*d});
                en.setAttribute('enemy-ai', {type: isS ? 'shooter' : 'chaser'});
                container.appendChild(en);
            }
            updateHUD();
        }

        function nextLevel() {
            game.lvl++; game.hp = Math.min(game.hp + 30, 100);
            generateMap();
        }

        function updateHUD() {
            document.querySelector('#hud').setAttribute('value', `HP: ${Math.ceil(game.hp)} | LVL: ${game.lvl} | ENEMIES: ${game.enemies}`);
        }

        function die() {
            game.active = false;
            document.querySelector('#enemies-group').innerHTML = '';
            document.querySelector('#walls-group').innerHTML = '';
            document.querySelector('#menu').setAttribute('visible', true);
            document.querySelector('#hud').setAttribute('value', "GAME OVER - TRIGGER TO RESTART");
        }
    </script>
</body>
</html>
