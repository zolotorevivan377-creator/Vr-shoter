<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Quest VR Shooter - Final Fix</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene seth-logic renderer="antialias: true">
        <a-assets>
            <a-mixin id="wall-buf" geometry="primitive: box; width: 3; height: 3; depth: 3" material="color: #333"></a-mixin>
            <a-mixin id="bullet-buf" geometry="primitive: sphere; radius: 0.1" material="color: #0f0; emissive: #0f0"></a-mixin>
        </a-assets>

        <a-sky color="#020202"></a-sky>
        <a-plane rotation="-90 0 0" width="100" height="100" color="#111"></a-plane>

        <a-entity id="rig" position="0 0 0">
            <a-entity id="head" camera look-controls position="0 1.6 0">
                <a-text id="hud" value="READY" position="0 -0.4 -1" scale="0.4 0.4 0.4" align="center" color="#0f0"></a-text>
            </a-entity>

            <a-entity id="lhand" oculus-touch-controls="hand: left" move-logic></a-entity>
            <a-entity id="rhand" oculus-touch-controls="hand: right" shoot-logic></a-entity>
        </a-entity>

        <a-entity id="world"></a-entity>
    </a-scene>

    <script>
        // Глобальный синтезатор звука (чтобы работало без файлов)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 1. ПРАВИЛЬНОЕ ПЕРЕДВИЖЕНИЕ (БЕЗ ИНВЕРСИИ)
        AFRAME.registerComponent('move-logic', {
            init: function () {
                this.axis = [0, 0, 0, 0];
                this.el.addEventListener('axismove', (e) => {
                    this.axis = e.detail.axis;
                });
            },
            tick: function (t, dt) {
                // Стик на Quest: 2 - право/лево, 3 - вперед/назад
                let dx = this.axis[2] || 0;
                let dz = this.axis[3] || 0;

                if (Math.abs(dx) < 0.1 && Math.abs(dz) < 0.1) return;

                const rig = document.getElementById('rig').object3D;
                const head = document.getElementById('head').object3D;
                
                const angle = head.rotation.y;
                const speed = 0.005 * dt;

                // Исправленная математика: инвертируем dz для корректного движения вперед
                rig.position.x += (dx * Math.cos(angle) + dz * Math.sin(angle)) * speed;
                rig.position.z += (dx * Math.sin(angle) - dz * Math.cos(angle)) * speed;
            }
        });

        // 2. СТРЕЛЬБА (УЛУЧШЕННАЯ)
        AFRAME.registerComponent('shoot-logic', {
            init: function () {
                // Слушаем и triggerdown, и просто нажатие кнопки (на всякий случай)
                this.el.addEventListener('triggerdown', () => this.fire());
                this.el.addEventListener('buttondown', (e) => { if(e.detail.id === 1) this.fire(); });
            },
            fire: function () {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playSfx(800, 'square'); // Звук выстрела

                const bullet = document.createElement('a-entity');
                bullet.setAttribute('mixin', 'bullet-buf');
                
                const pos = new THREE.Vector3();
                this.el.object3D.getWorldPosition(pos);
                bullet.setAttribute('position', pos);

                const dir = new THREE.Vector3(0, 0, -1);
                const quat = new THREE.Quaternion();
                this.el.object3D.getWorldQuaternion(quat);
                dir.applyQuaternion(quat);

                this.el.sceneEl.appendChild(bullet);

                const move = () => {
                    if (!bullet.parentNode) return;
                    const bPos = bullet.getAttribute('position');
                    bullet.setAttribute('position', {
                        x: bPos.x + dir.x * 0.7, y: bPos.y + dir.y * 0.7, z: bPos.z + dir.z * 0.7
                    });

                    // Коллизия
                    document.querySelectorAll('.enemy').forEach(en => {
                        if (bullet.object3D.position.distanceTo(en.object3D.position) < 0.8) {
                            en.parentNode.removeChild(en);
                            bullet.parentNode.removeChild(bullet);
                            playSfx(200, 'sawtooth'); // Звук взрыва
                            document.querySelector('a-scene').emit('kill');
                        }
                    });

                    if (bullet.object3D.position.length() > 60) {
                        if (bullet.parentNode) bullet.parentNode.removeChild(bullet);
                    } else {
                        requestAnimationFrame(move);
                    }
                };
                move();
            }
        });

        // 3. ВРАГИ КОТОРЫЕ ДВИГАЮТСЯ
        AFRAME.registerComponent('enemy-ai', {
            tick: function (t, dt) {
                const rig = document.getElementById('rig').object3D;
                const pos = this.el.object3D.position;
                
                // Вектор к игроку
                const dir = new THREE.Vector3().subVectors(rig.position, pos).normalize();
                const speed = 0.002 * dt; // Медленно ползут к игроку

                this.el.setAttribute('position', {
                    x: pos.x + dir.x * speed,
                    y: 1.5,
                    z: pos.z + dir.z * speed
                });
            }
        });

        // 4. МИР
        AFRAME.registerComponent('seth-logic', {
            init: function () {
                this.level = 1;
                this.enemies = 0;
                this.makeLevel();
                this.el.addEventListener('kill', () => {
                    this.enemies--;
                    this.updateUI();
                    if (this.enemies <= 0) this.win();
                });
            },
            makeLevel: function () {
                const world = document.getElementById('world');
                world.innerHTML = '';
                this.enemies = 3 + this.level;

                for(let i=0; i<this.enemies; i++) {
                    const en = document.createElement('a-entity');
                    en.setAttribute('class', 'enemy');
                    en.setAttribute('geometry', 'primitive: octahedron; radius: 0.6');
                    en.setAttribute('material', 'color: red; emissive: #300');
                    en.setAttribute('enemy-ai', ''); // Добавляем ИИ
                    en.setAttribute('position', `${(Math.random()-0.5)*40} 1.5 ${(Math.random()-0.5)*40}`);
                    world.appendChild(en);
                }
                this.updateUI();
            },
            updateUI: function() {
                document.getElementById('hud').setAttribute('value', `LEVEL: ${this.level}\nENEMIES: ${this.enemies}`);
            },
            win: function() {
                this.level++;
                playSfx(1200, 'sine');
                document.getElementById('hud').setAttribute('value', "NEXT LEVEL...");
                setTimeout(() => this.makeLevel(), 2000);
            }
        });
    </script>
</body>
</html>
