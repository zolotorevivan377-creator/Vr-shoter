<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Neon Quest VR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script>
      // 1. ЛОГИКА СТРЕЛЬБЫ И ПОПАДАНИЙ
      AFRAME.registerComponent('shooter', {
        init: function () {
          this.el.addEventListener('triggerdown', () => {
            this.shoot();
          });
        },
        shoot: function () {
          // Создаем пулю
          const bullet = document.createElement('a-sphere');
          bullet.setAttribute('radius', '0.05');
          bullet.setAttribute('color', '#00ffff');
          
          // Определяем позицию и направление пушки
          const position = new THREE.Vector3();
          this.el.object3D.getWorldPosition(position);
          const direction = new THREE.Vector3(0, 0, -1);
          direction.applyQuaternion(this.el.object3D.quaternion);
          
          bullet.setAttribute('position', position);
          this.el.sceneEl.appendChild(bullet);

          // Движение пули через интервал (самый надежный метод)
          const timer = setInterval(() => {
            const pos = bullet.getAttribute('position');
            bullet.setAttribute('position', {
              x: pos.x + direction.x * 0.5,
              y: pos.y + direction.y * 0.5,
              z: pos.z + direction.z * 0.5
            });

            // Проверка попадания во врагов
            const enemies = document.querySelectorAll('.enemy');
            enemies.forEach(enemy => {
              const enemyPos = enemy.getAttribute('position');
              const dist = new THREE.Vector3(pos.x, pos.y, pos.z).distanceTo(enemyPos);
              if (dist < 0.8) {
                enemy.parentNode.removeChild(enemy);
                bullet.parentNode.removeChild(bullet);
                clearInterval(timer);
                checkWin();
              }
            });
          }, 20);

          // Удаляем пулю через 2 сек, если не попала
          setTimeout(() => {
            if (bullet.parentNode) {
              bullet.parentNode.removeChild(bullet);
              clearInterval(timer);
            }
          }, 2000);
        }
      });

      // 2. ГЕНЕРАЦИЯ УРОВНЯ
      function spawnLevel() {
        const scene = document.querySelector('a-scene');
        const levelNum = window.currentLevel || 1;
        
        // Удаляем старые объекты (кроме игрока и света)
        document.querySelectorAll('.level-item').forEach(el => el.parentNode.removeChild(el));

        // Спавним стены
        for (let i = 0; i < 10; i++) {
          const wall = document.createElement('a-box');
          wall.setAttribute('class', 'level-item');
          wall.setAttribute('position', `${(Math.random()-0.5)*20} 1.5 ${(Math.random()-0.5)*20}`);
          wall.setAttribute('color', '#222');
          wall.setAttribute('width', '2');
          wall.setAttribute('height', '3');
          scene.appendChild(wall);
        }

        // Спавним врагов
        for (let i = 0; i < 3 + levelNum; i++) {
          const enemy = document.createElement('a-octahedron');
          enemy.setAttribute('class', 'level-item enemy');
          enemy.setAttribute('position', `${(Math.random()-0.5)*30} 1.5 -10`);
          enemy.setAttribute('color', '#ff0044');
          enemy.setAttribute('radius', '0.5');
          scene.appendChild(enemy);
        }
        
        updateHUD();
      }

      function checkWin() {
        if (document.querySelectorAll('.enemy').length === 0) {
          window.currentLevel = (window.currentLevel || 1) + 1;
          spawnLevel();
        }
      }

      function updateHUD() {
        const hud = document.querySelector('#hud');
        hud.setAttribute('value', `LEVEL: ${window.currentLevel || 1}`);
      }

      // Запуск при клике (вход в игру)
      window.addEventListener('click', () => {
        if (!window.gameStarted) {
          window.gameStarted = true;
          window.currentLevel = 1;
          spawnLevel();
          document.querySelector('#msg').setAttribute('visible', 'false');
        }
      });
    </script>
  </head>
  <body>
    <a-scene background="color: #000">
      
      <a-entity position="0 0 0" geometry="primitive: plane; width: 100; height: 100" 
                rotation="-90 0 0" material="src: url(https://i.imgur.com/7XU6u7M.png); repeat: 50 50; color: #00ff44"></a-entity>
      <a-light type="ambient" color="#fff" intensity="0.5"></a-light>
      <a-light type="point" position="0 5 0" intensity="1"></a-light>

      <a-entity id="rig" position="0 0 0">
        <a-camera id="cam">
          <a-text id="hud" value="CLICK TO START" position="0 -0.5 -1" align="center" width="2" color="#00ffff"></a-text>
          <a-text id="msg" value="PRESS TRIGGER" position="0 0 -1.2" align="center" width="4" color="#fff"></a-text>
        </a-camera>
        
        <a-entity oculus-touch-controls="hand: right" shooter>
          <a-box scale="0.1 0.1 0.4" position="0 0 -0.2" color="#444"></a-box>
        </a-entity>
        
        <a-entity oculus-touch-controls="hand: left"></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
