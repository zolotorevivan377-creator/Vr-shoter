<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Quest Shooter: Fixed Edition</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>
<body>
    <a-scene background="color: #000">
        <a-assets>
            <a-mixin id="bullet" geometry="primitive: sphere; radius: 0.07" material="color: #FFEF00; shader: flat"></a-mixin>
            <a-mixin id="enemy-mesh" geometry="primitive: cylinder; radius: 0.4; height: 1.8" material="color: #ff0000"></a-mixin>
        </a-assets>

        <a-entity id="env" environment="preset: logic; dressingAmount: 0; ground: flat; grid: cross"></a-entity>

        <a-entity id="rig" movement-controls="fly: false; speed: 0.15">
            <a-camera id="camera" look-controls position="0 1.6 0">
                <a-text id="hud" value="READY?" position="0 -0.4 -1" scale="0.4 0.4 0.4" align="center" color="#00FF00"></a-text>
                
                <a-entity id="menu" position="0 0 -1.2">
                    <a-plane color="#111" width="1.8" height="0.8" opacity="0.9">
                        <a-text id="menu-text" value="VR SHOOTER\n\nPress TRIGGER on Right Hand to Start" align="center" width="3"></a-text>
                    </a-plane>
                </a-entity>
            </a-camera>

            <a-entity oculus-touch-controls="hand: left"></a-entity>
            
            <a-entity id="rightHand" oculus-touch-controls="hand: right" shooter-controller>
                <a-box width="0.05" height="0.05" depth="0.2" position="0 0 -0.1" material="color: #333"></a-box>
            </a-entity>
        </a-entity>

        <a-entity id="enemies-container"></a-entity>
        <a-entity id="bullets-container"></a-entity>

        <a-entity id="snd-shoot" sound="src: url(https://cdn.aframe.io/360-video-example/guerrilla_sound_design_gun_shot.mp3); poolSize: 5"></a-entity>
    </a-scene>

    <script>
        let gameActive = false;
        let currentLevel = 1;
        let enemiesCount = 0;

        // Логика управления стрельбой
        AFRAME.registerComponent('shooter-controller', {
            init: function () {
                // На Meta Quest используем 'triggerdown'
                this.el.addEventListener('triggerdown', () => {
                    if (!gameActive) {
                        startGame();
                    } else {
                        this.shoot();
                    }
                });
            },
            shoot: function () {
                const bullet = document.createElement('a-entity');
                bullet.setAttribute('mixin', 'bullet');
                
                // Получаем позицию и направление из контроллера
                const position = new THREE.Vector3();
                this.el.object3D.getWorldPosition(position);
                
                const rotation = new THREE.Quaternion();
                this.el.object3D.getWorldQuaternion(rotation);
                
                const direction = new THREE.Vector3(0, 0, -1);
                direction.applyQuaternion(rotation);

                bullet.setAttribute('position', position);
                bullet.setAttribute('bullet-logic', { dirX: direction.x, dirY: direction.y, dirZ: direction.z });
                
                document.querySelector('#bullets-container').appendChild(bullet);
                document.querySelector('#snd-shoot').components.sound.stopSound();
                document.querySelector('#snd-shoot').components.sound.playSound();

                // Вибрация
                const gamepad = this.el.components['oculus-touch-controls'].gamepad;
                if (gamepad && gamepad.hapticActuators) {
                    gamepad.hapticActuators[0].pulse(0.8, 60);
                }
            }
        });

        // Полет пули и попадание
        AFRAME.registerComponent('bullet-logic', {
            schema: { dirX: {type:'number'}, dirY: {type:'number'}, dirZ: {type:'number'}, speed: {default: 0.5} },
            tick: function () {
                let pos = this.el.getAttribute('position');
                pos.x += this.data.dirX * this.data.speed;
                pos.y += this.data.dirY * this.data.speed;
                pos.z += this.data.dirZ * this.data.speed;
                this.el.setAttribute('position', pos);

                // Проверка столкновения с врагами
                const enemies = document.querySelectorAll('.enemy');
                enemies.forEach(en => {
                    const enPos = en.getAttribute('position');
                    const dist = Math.sqrt(
                        Math.pow(pos.x - enPos.x, 2) + 
                        Math.pow(pos.z - enPos.z, 2)
                    );
                    if (dist < 0.6 && Math.abs(pos.y - enPos.y) < 1) {
                        en.parentNode.removeChild(en);
                        this.el.parentNode.removeChild(this.el);
                        enemiesCount--;
                        updateHUD();
                        if (enemiesCount <= 0) nextLevel();
                    }
                });

                if (Math.abs(pos.z) > 50) this.el.parentNode.removeChild(this.el);
            }
        });

        // ИИ врага
        AFRAME.registerComponent('enemy-ai', {
            schema: { speed: {default: 0.03} },
            tick: function () {
                const playerPos = document.querySelector('#camera').object3D.position;
                const enemyPos = this.el.object3D.position;

                // Движение к игроку
                const angle = Math.atan2(playerPos.x - enemyPos.x, playerPos.z - enemyPos.z);
                enemyPos.x += Math.sin(angle) * this.data.speed;
                enemyPos.z += Math.cos(angle) * this.data.speed;
                this.el.setAttribute('position', enemyPos);

                // Проверка смерти игрока
                const dist = Math.sqrt(Math.pow(playerPos.x - enemyPos.x, 2) + Math.pow(playerPos.z - enemyPos.z, 2));
                if (dist < 0.8 && gameActive) {
                    gameOver();
                }
            }
        });

        function startGame() {
            gameActive = true;
            currentLevel = 1;
            document.querySelector('#menu').setAttribute('visible', false);
            generateLevel();
        }

        function generateLevel() {
            const container = document.querySelector('#enemies-container');
            container.innerHTML = '';
            enemiesCount = 3 + currentLevel;

            // Меняем пресет окружения для разнообразия
            const presets = ['forest', 'osiris', 'yavapai', 'goaland'];
            const p = presets[currentLevel % presets.length];
            document.querySelector('#env').setAttribute('environment', {preset: p, dressingAmount: 10});

            for (let i = 0; i < enemiesCount; i++) {
                const enemy = document.createElement('a-entity');
                enemy.classList.add('enemy');
                enemy.setAttribute('mixin', 'enemy-mesh');
                
                // Спавн в радиусе 10-15 метров от игрока, чтобы они точно были видны
                const angle = Math.random() * Math.PI * 2;
                const dist = 12 + Math.random() * 5;
                enemy.setAttribute('position', {
                    x: Math.sin(angle) * dist,
                    y: 0.9,
                    z: Math.cos(angle) * dist
                });
                
                enemy.setAttribute('enemy-ai', { speed: 0.02 + (currentLevel * 0.01) });
                container.appendChild(enemy);
            }
            updateHUD();
        }

        function nextLevel() {
            currentLevel++;
            generateLevel();
        }

        function updateHUD() {
            document.querySelector('#hud').setAttribute('value', `LEVEL: ${currentLevel} | ENEMIES: ${enemiesCount}`);
        }

        function gameOver() {
            gameActive = false;
            document.querySelector('#enemies-container').innerHTML = '';
            document.querySelector('#menu').setAttribute('visible', true);
            document.querySelector('#menu-text').setAttribute('value', `YOU DIED\nReached Level: ${currentLevel}\n\nPress Trigger to Retry`);
        }
    </script>
</body>
</html>
