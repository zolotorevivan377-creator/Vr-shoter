<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Neon Breach Quest Edition</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <script>
      // Глобальное состояние
      let gameState = {
        hp: 100, ammo: 15, level: 1, enemiesLeft: 0, active: false
      };

      // Логика игры
      AFRAME.registerComponent('game-logic', {
        init: function () {
          this.hud = document.querySelector('#hud-text');
          this.scene = this.el;
          
          this.el.addEventListener('enemy-hit', () => {
            gameState.enemiesLeft--;
            this.updateHUD();
            if (gameState.enemiesLeft <= 0) this.nextLevel();
          });

          this.el.addEventListener('player-damaged', () => {
            gameState.hp -= 10;
            this.updateHUD();
            if (gameState.hp <= 0) location.reload();
          });
        },
        updateHUD: function() {
          this.hud.setAttribute('value', `LEVEL: ${gameState.level} | HP: ${gameState.hp} | AMMO: ${gameState.ammo}`);
        },
        nextLevel: function() {
          gameState.level++;
          this.el.components.level_builder.generate();
        }
      });

      // Генератор уровня
      AFRAME.registerComponent('level-builder', {
        init: function() { 
          if(gameState.active) this.generate(); 
        },
        generate: function() {
          // Чистим старое
          const old = document.querySelectorAll('.obj');
          old.forEach(el => el.parentNode.removeChild(el));

          // Стены
          for (let i = 0; i < 10; i++) {
            let wall = document.createElement('a-box');
            wall.setAttribute('class', 'obj');
            wall.setAttribute('position', `${(Math.random()-0.5)*30} 1.5 ${(Math.random()-0.5)*30}`);
            wall.setAttribute('color', '#111');
            wall.setAttribute('scale', '2 3 2');
            wall.setAttribute('material', 'emissive: #00ff44; emissiveIntensity: 0.1');
            this.el.appendChild(wall);
          }

          // Враги
          gameState.enemiesLeft = 3 + gameState.level;
          for (let i = 0; i < gameState.enemiesLeft; i++) {
            let en = document.createElement('a-sphere');
            en.setAttribute('class', 'obj enemy');
            en.setAttribute('color', '#ff0044');
            en.setAttribute('radius', '0.5');
            en.setAttribute('position', `${(Math.random()-0.5)*40} 1.5 -15`);
            en.setAttribute('enemy-ai', '');
            this.el.appendChild(en);
          }
          this.el.components['game-logic'].updateHUD();
        }
      });

      // ИИ Врага
      AFRAME.registerComponent('enemy-ai', {
        tick: function() {
          let playerPos = document.querySelector('#camera').object3D.position;
          let enemyPos = this.el.object3D.position;
          let dir = new THREE.Vector3().subVectors(playerPos, enemyPos).normalize();
          this.el.object3D.position.addScaledVector(dir, 0.03);

          if (enemyPos.distanceTo(playerPos) < 1.5) {
            this.el.sceneEl.emit('player-damaged');
            this.el.parentNode.removeChild(this.el);
            this.el.sceneEl.emit('enemy-hit');
          }
        }
      });

      // Стрельба
      AFRAME.registerComponent('shooter', {
        init: function() {
          this.el.addEventListener('triggerdown', () => {
            if (gameState.ammo > 0) {
              this.shoot();
              gameState.ammo--;
              this.el.sceneEl.components['game-logic'].updateHUD();
            } else {
              setTimeout(() => { gameState.ammo = 15; }, 1500); // Авто-релоад
            }
          });
        },
        shoot: function() {
          let bullet = document.createElement('a-sphere');
          bullet.setAttribute('radius', '0.05');
          bullet.setAttribute('color', '#00fbff');
          
          let worldPos = new THREE.Vector3();
          this.el.object3D.getWorldPosition(worldPos);
          bullet.setAttribute('position', worldPos);
          
          let dir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.el.object3D.quaternion);
          this.el.sceneEl.appendChild(bullet);

          let interval = setInterval(() => {
            bullet.object3D.position.addScaledVector(dir, 0.5);
            let enemies = document.querySelectorAll('.enemy');
            enemies.forEach(en => {
              if (bullet.object3D.position.distanceTo(en.object3D.position) < 0.7) {
                en.parentNode.removeChild(en);
                bullet.parentNode.removeChild(bullet);
                this.el.sceneEl.emit('enemy-hit');
                clearInterval(interval);
              }
            });
          }, 20);
          setTimeout(() => { if(bullet.parentNode) bullet.parentNode.removeChild(bullet); clearInterval(interval); }, 2000);
        }
      });

      // Кнопка старта
      function startGame() {
        gameState.active = true;
        document.querySelector('#menu').setAttribute('visible', 'false');
        document.querySelector('a-scene').components['level-builder'].generate();
      }
    </script>
  </head>
  <body>
    <a-scene game-logic level-builder>
      <a-sky color="#050505"></a-sky>
      <a-grid material="gridColor: #00ff44; color: #000"></a-grid>

      <a-entity id="menu" position="0 1.6 -2">
        <a-text value="NEON BREACH\nClick Trigger to Start" align="center" color="#00fbff"></a-text>
        <a-box position="0 -0.5 0" scale="1 0.5 0.1" color="#222" onclick="startGame()"></a-box>
      </a-entity>

      <a-entity id="rig" position="0 0 0" movement-controls="fly: false">
        <a-entity id="camera" camera position="0 1.6 0" look-controls>
          <a-text id="hud-text" value="LEVEL 1" position="0 -0.5 -1" align="center" width="2" color="#00fbff"></a-text>
        </a-entity>
        <a-entity laser-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right" shooter></a-entity>
      </a-entity>
    </a-scene>

    <script>
      // Хак для старта на Quest
      window.addEventListener('click', () => {
        if (!gameState.active) startGame();
      });
    </script>
  </body>
</html>
