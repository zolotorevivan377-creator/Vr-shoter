<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebXR VR Shooter — Meta Quest</title>
    <meta name="description" content="Простой VR шутер для браузера">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <script>
      // Компонент стрельбы
      AFRAME.registerComponent('shooter', {
        init: function () {
          // Слушаем нажатие курка (triggerdown)
          this.el.addEventListener('triggerdown', (evt) => {
            this.shoot();
          });
        },
        shoot: function () {
          // Создаем пулю
          const bullet = document.createElement('a-sphere');
          const worldPos = new THREE.Vector3();
          const worldDir = new THREE.Vector3();
          
          // Получаем позицию и направление контроллера
          this.el.object3D.getWorldPosition(worldPos);
          this.el.object3D.getWorldDirection(worldDir);
          
          bullet.setAttribute('radius', '0.05');
          bullet.setAttribute('color', '#FFEB3B');
          bullet.setAttribute('position', worldPos);
          // Добавляем физику пуле
          bullet.setAttribute('dynamic-body', 'mass: 0.1; shape: sphere');
          
          this.el.sceneEl.appendChild(bullet);
          
          // Импульс пули (летит вперед)
          bullet.addEventListener('body-loaded', () => {
            const force = worldDir.multiplyScalar(-20); // Скорость полета
            bullet.body.applyImpulse(
              new CANNON.Vec3(force.x, force.y, force.z),
              new CANNON.Vec3(worldPos.x, worldPos.y, worldPos.z)
            );
          });

          // Удаляем пулю через 3 секунды, чтобы не грузить память
          setTimeout(() => bullet.parentNode.removeChild(bullet), 3000);
        }
      });

      // Логика исчезновения мишени при попадании
      AFRAME.registerComponent('target', {
        init: function () {
          this.el.addEventListener('collide', (e) => {
            // Если попала пуля (сфера)
            if (e.detail.body.el.tagName === 'A-SPHERE') {
              this.el.setAttribute('visible', false);
              setTimeout(() => this.el.setAttribute('visible', true), 2000);
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene physics="debug: false; gravity: -9.8">
      <a-sky color="#222"></a-sky>
      <a-plane static-body rotation="-90 0 0" width="50" height="50" color="#333"></a-plane>

      <a-box target static-body position="-2 1.5 -5" color="#FF5722"></a-box>
      <a-box target static-body position="0 2.5 -7" color="#FF5722"></a-box>
      <a-box target static-body position="2 1 -4" color="#FF5722"></a-box>

      <a-entity id="rig">
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity laser-controls="hand: left" shooter raycaster="objects: .target"></a-entity>
        <a-entity laser-controls="hand: right" shooter raycaster="objects: .target"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
