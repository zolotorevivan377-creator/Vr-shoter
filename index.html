<!DOCTYPE html>
<html<head>
    <meta="utf-8">
 <title>VR Shooter - Procedural Levels</title    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="://unpkg.com/aframe-extras@7..0/dist/aframetras.min.js"></script    <script src="://cdn.jsdelivr.net/npmframe-physics-system@.2.1/distframe-physics-system.min"></script>
</head>
<body>
    <a-scene 
        vr-mode-ui="enabled: true"
        physics="driver: cannon; gravity: -9.8"
        background="color: #87CEEB"
        fog="type: linear; color: #87EB; near: ; far: 50        
        <!-- Assets (mixins for reuse) -->
        <a-assets>
            <aixin id="enemy"                     geometry="primitive: box width: 05; height: 1.5; depth: 0.3"
                     material="color: red"
                     class="enemy"
                     physics="shape: box; mass: 1; fixed: false"></a-mixin>
            <a-mixin id="wall" 
                     geometry="primitive: box; width: 4; height: 2; depth: 0.1"
                     material="color: gray"
                     physicsshape: box; mass: 0; fixed: truea-mixin>
            <a-mixin id="floor" 
                     geometryprimitive: plane; width 50; height:50"
                     material=": #90EE90"
                    ="shape: plane; mass 0; fixed true"
                     rotation="-90 00"></a-mixin            <!-- Simple gun visual -->
            <aixin id="gun"
                     geometry="primitive box; width: .05; height: 0.05; depth: 0.3"
                     material="color: black"
                     position="0.2  -0.3  -0.5"></a-m>
        </a-assets>

        <!-- Player Rig -->
        <a-entity id="rig 
                  movement-controlsconstrainToNavMesh:; speed: 0.1"
                  position="0 0 0">
            <a-camera id="camera 
                      position="0 1.6 0"
                      look-controls
                      raycaster="objects:enemy; far: 100">
                <!-- Gun attached to camera -->
                <a mixin="gun"></a>
            </a-camera            
            <!-- Hand controllers            <a-entity idleft-hand" 
                     -controls="hand: left; model: true"
                      laser-controls="hand:"></a-entity>
           a-entity id="right" 
                      hand-controls="hand: right; model true"
                      laser-controls="hand: right"
 raycaster="objects:enemy; far: "
                      shoot></a-entity>
       a-entity>

        <!-- -->
        <a-entity="type: ambient; color: #445451; intensity: 0.5"></a-entity>
        <a-entity light="type: directional; color: #FFFFFF; intensity: 0.7" 
                  position="-1 1 0" 
                  rotation="-60 0 0"></a-entity>

        <!-- UI Text -->
        <a-text id="level-text" 
                value="Level 1 - Clear all enemies!" 
                position="0 1.5 -3" 
                align="center" 
                color="white" 
                scale="2 2 2"
                visible="true"></a-text>

        <!-- Initial Floor -->
        <a-entity mixin="floor" position="0 0 0"></a-entity>

        <!-- Game Manager -->
        <a-entity id="game-manager" 
                  game-script="level:1; enemiesLeft:0"></a-entity>

 </a-scene>

    <!-- Custom Components -->
    <script>
        Shooting Component (attached to right hand)
        AFRAMEComponent('shoot', {
            init: function () {
                this.elEventListener('raycastersection', (evt) => {
                    const hitEl = evt.detail.els[0];
                    if (hitEl && hitEl.classList.contains('enemy')) {
                        // Remove enemy
                        hitEl.parentNode.removeChild(hitEl);
                        // Update game manager
                        const gameManager =.getElementById('game-manager');
                        if (Manager && gameManager.components['game-script']) {
                            gameManager.components['game-script'].updateEnemies();
                        }
                    }
                });
            }
               // Game Manager Script        AFRAME.registerComponentgame-script', {
            schema: {
                level: { type: 'int', default: 1 },
                enemiesLeft: { type: 'int', default:  }
            },

            init: function () {
                this.enemies = [];
                this.generateLevel();
            },

            generateLevel: function () {
                const level = this.data.level;
                const sceneEl = this.el.sceneEl;

                // Clear previous level entities (except floor, rig, lights)
                const oldEnemies = document.querySelectorAll('.enemy');
                const oldWalls = document.querySelectorAll('.wall');
                oldEnemies.forEach(el => el.parentNode.removeChild(el));
                oldWalls.forEach(el => el.parentNode.removeChild(el));

                this.enemies =                this.data.enemies = 5 + level 2; // Increase per level

                Generate random walls (maze-like barriers)
                for ( i = 0; < 10 + * 2; i++) {
                    const wall = document.createElement('a-entity');
                    wall.setAttribute('mixin', 'wall');
                   .classList.add('wall');
                    const x = (.random() - 0.5) * 40                    const z = (Math.random() - 05) * 40;
                    const rotY =.random() * 360;
                    wall.setAttribute('position', `${x} 1 ${z}`);
                    wall.setAttribute('rotation', `0 ${rotY} 0`);
                    sceneEl.appendChild(wall);
 }

                // Spawn enemies, avoiding player start area
                for (let i = 0; i < this.data.enemiesLeft; i++) {
                    const enemy = document.createElement('a-entity');
                    enemy.setAttribute('mixin', 'enemy');
                    const x = (Math.random() - 0.5) * 30 + 5; // Offset from center
                    const z = (Math.random() - 0.5) * 30 + 5;
                    enemy.setAttribute('position', `${x} 0.75 ${z}`);
                    
                    // Simple AI: occasional movement towards player
                    enemy.addEventListener('componentchanged', (evt) => {
                        if (evt.detail.name === 'position')                            const playerPos = document.querySelector('#rig').object3D.position;
                            const enemyPos = enemy.object3D.position;
                            const distance = playerPos.distanceTo(enemyPos);
                            if (distance < 10 && Math.random() < 0.01) { // Slow, random movement
                                const direction = new THREE.Vector3().subVectors(playerPos, enemyPos).normalize();
                                enemyPos.add(direction.multiplyScalar(0.1));
                                enemy.setAttribute('position enemyPos);
                            }
 }
                    });

                    scene.appendChild(enemy);
                    this.enemies.push(enemy);
 }

                // Update UI                const levelText = document.getElementById('-text');
                levelTextAttribute('value', `Level ${level} - Enemies: ${this.data.enemiesLeft}`);
                levelText.setAttribute('visible', 'true');
                
                // Hide start message after 3 seconds
                setTimeout(() => {
                    levelText.set('visible', 'false');
                }, 3000);

 console.log(`Level ${level} generated with ${this.data.enemiesLeft} enemies.`);
            },

            updateEnemies: function () {
                this.enemiesLeft--;
                const remaining = document.querySelectorAll('.enemy').length;
                console.log(`Enemies left: ${remaining}`);

                const levelText = document.getElementByIdlevel-text');
                levelText.setAttribute('value', `Enemies Remaining: ${remaining}`);
                levelText.setAttribute('visible', 'true');

                if (remaining === 0) {
                    levelText.setAttribute('value 'Level Complete! Next level starting...                    setTimeout(() =>                        this.data.level++;
 this.generateLevel();
                    2000);
                } else {
                    setTimeout(() => {
                        levelText.setAttribute('visible', 'false');
                    }, 2000);
                }
            }
        });
    </script>

    <!-- Instructions (visible on desktop) -->
    <div style="position: absolute; top: 10px; left: 10px; color: white; z-index: 100; background: rgba(0,0,0,0.5); padding: 10px        <p>Save as HTML, run local server (e.g., python -m http.server 8000), open Quest Browser: http://&lt;your-ip&gt;:8000/vr-shooter.html</p>
        <p>Enter VR mode. Use right trigger to shoot red enemies. Clear all to advance levels.</p>
    </div>
</body>
html>
