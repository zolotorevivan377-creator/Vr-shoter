<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Meta Quest VR Shooter - Fixed Movement</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <script>
      // Предзагрузка звуков через Web Audio API для мгновенного отклика
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      let shotBuffer, dieBuffer;

      async function loadSound(url) {
        try {
          const response = await fetch(url);
          const arrayBuffer = await response.arrayBuffer();
          return await audioCtx.decodeAudioData(arrayBuffer);
        } catch (e) { console.error("Sound load error", e); }
      }

      loadSound('https://cdn.aframe.io/basic-guide/audio/pew.wav').then(buf => shotBuffer = buf);
      loadSound('https://cdn.aframe.io/360-video/click.mp3').then(buf => dieBuffer = buf);

      function playSfx(buffer) {
        if (!buffer) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start(0);
      }

      // Логика игры
      AFRAME.registerComponent('game-manager', {
        init: function () {
          this.level = 1;
          this.enemiesCount = 0;
          this.el.addEventListener('enemy-killed', () => {
            this.enemiesCount--;
            if (this.enemiesCount <= 0) this.nextLevel();
          });
          this.generateLevel();
        },
        generateLevel: function () {
          const scene = this.el;
          document.querySelectorAll('.lvl-obj').forEach(e => e.parentNode.removeChild(e));
          
          // Сброс игрока
          document.querySelector('#rig').setAttribute('position', '0 0 0');
          
          this.enemiesCount = 3 + this.level;
          
          // Создание стен
          for (let i = 0; i < 15; i++) {
            let wall = document.createElement('a-box');
            wall.setAttribute('class', 'lvl-obj');
            wall.setAttribute('position', `${(Math.random()-0.5)*30} 1.5 ${(Math.random()-0.5)*30}`);
            wall.setAttribute('scale', '2 3 0.5');
            wall.setAttribute('color', '#333');
            scene.appendChild(wall);
          }

          // Создание врагов
          for (let i = 0; i < this.enemiesCount; i++) {
            let enemy = document.createElement('a-sphere');
            enemy.setAttribute('class', 'lvl-obj target');
            enemy.setAttribute('position', `${(Math.random()-0.5)*30} 1.5 ${-5 - Math.random()*20}`);
            enemy.setAttribute('color', 'red');
            enemy.setAttribute('radius', '0.6');
            enemy.setAttribute('enemy-hit', '');
            scene.appendChild(enemy);
          }
        },
        nextLevel: function () {
          this.level++;
          let ui = document.querySelector('#ui-text');
          ui.setAttribute('value', 'LEVEL COMPLETE!');
          ui.setAttribute('visible', 'true');
          setTimeout(() => {
            ui.setAttribute('visible', 'false');
            this.generateLevel();
          }, 2000);
        }
      });

      AFRAME.registerComponent('enemy-hit', {
        init: function () {
          this.el.addEventListener('click', () => {
            playSfx(dieBuffer);
            this.el.sceneEl.emit('enemy-killed');
            this.el.parentNode.removeChild(this.el);
          });
        }
      });

      AFRAME.registerComponent('weapon-logic', {
        init: function () {
          this.el.addEventListener('triggerdown', () => {
            playSfx(shotBuffer);
            // Вибрация контроллера
            if (this.el.components['oculus-touch-controls']) {
              this.el.components['oculus-touch-controls'].pulse(0.5, 100);
            }
          });
        }
      });
    </script>
  </head>
  <body>

    <a-scene game-manager renderer="antialias: true; colorManagement: true">
      
      <a-entity environment="preset: blueprint; dressingAmount: 10"></a-entity>

      <a-entity id="rig" 
                movement-controls="controls: gamepad; speed: 0.2" 
                position="0 0 0">
        
        <a-entity camera 
                  position="0 1.6 0" 
                  look-controls="pointerLockEnabled: true">
          <a-text id="ui-text" value="" align="center" position="0 0 -1" scale="0.4 0.4 0.4" visible="false" color="yellow"></a-text>
        </a-entity>

        <a-entity oculus-touch-controls="hand: left"></a-entity>

        <a-entity id="rightHand" 
                  oculus-touch-controls="hand: right"
                  laser-controls="hand: right" 
                  raycaster="objects: .target; far: 50; showLine: true"
                  line="color: red; opacity: 0.7"
                  weapon-logic>
            <a-box scale="0.05 0.05 0.2" position="0 0 -0.1" color="#111"></a-box>
        </a-entity>

      </a-entity>

    </a-scene>
  </body>
</html>
