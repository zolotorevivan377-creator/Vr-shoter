<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Shooter Ultimate - Fix</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); z-index: 9999;
        display: flex; justify-content: center; align-items: center;
        color: white; font-family: sans-serif; flex-direction: column;
      }
      button {
        padding: 20px 40px; font-size: 20px; cursor: pointer;
        background: #00ff00; border: none; border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <h1>VR DUNGEON</h1>
      <p>Используйте левый стик для ходьбы, курок для стрельбы</p>
      <button onclick="startApp()">ИГРАТЬ (START)</button>
    </div>

    <a-scene seth-game-logic renderer="antialias: true">
      <a-assets>
        <a-mixin id="wall" geometry="primitive: box; width: 4; height: 4; depth: 4" material="color: #444"></a-mixin>
        <a-mixin id="bullet" geometry="primitive: sphere; radius: 0.05" material="color: #ff0; emissive: #ff0"></a-mixin>
      </a-assets>

      <a-entity id="rig" position="0 0 0" custom-movement>
        <a-entity id="camera" camera look-controls position="0 1.6 0">
          <a-entity position="0 -0.3 -1">
            <a-plane color="#000" opacity="0.7" width="0.8" height="0.25"></a-plane>
            <a-text id="ui-text" value="LEVEL 1" align="center" width="1.8" color="#0ff"></a-text>
          </a-entity>
        </a-entity>

        <a-entity id="leftHand" oculus-touch-controls="hand: left"></a-entity>
        <a-entity id="rightHand" oculus-touch-controls="hand: right" shooter-logic></a-entity>
      </a-entity>

      <a-sky color="#111"></a-sky>
      <a-entity id="level-container"></a-entity>
      
      <a-entity id="snd-shot" sound="src: url(https://cdn.freesound.org/previews/564/564756_12630654-lq.mp3); poolSize: 5"></a-entity>
      <a-entity id="snd-expl" sound="src: url(https://cdn.freesound.org/previews/511/511484_10287532-lq.mp3); poolSize: 5"></a-entity>
    </a-scene>

    <script>
      // 1. СТАРТ ПРИ НАЖАТИИ
      function startApp() {
        document.getElementById('overlay').style.display = 'none';
        const scene = document.querySelector('a-scene');
        if (scene.enterVR) scene.enterVR();
      }

      // 2. КАСТОМНОЕ ДВИЖЕНИЕ СТИКОМ (БЕЗ ВНЕШНИХ БИБЛИОТЕК)
      AFRAME.registerComponent('custom-movement', {
        init: function () {
          this.direction = new THREE.Vector3();
          this.leftStick = { x: 0, y: 0 };
          
          // Слушаем события стика с левого контроллера
          document.getElementById('leftHand').addEventListener('axismove', (e) => {
            this.leftStick.x = e.detail.axis[2]; // Стик вправо-влево
            this.leftStick.y = e.detail.axis[3]; // Стик вперед-назад
          });
        },
        tick: function (time, delta) {
          if (Math.abs(this.leftStick.x) < 0.1 && Math.abs(this.leftStick.y) < 0.1) return;

          const camera = document.getElementById('camera').object3D;
          const rig = this.el.object3D;

          // Получаем направление взгляда
          const rotation = camera.quaternion;
          this.direction.set(this.leftStick.x, 0, this.leftStick.y);
          this.direction.applyQuaternion(rotation);
          this.direction.y = 0; // Не даем летать вверх-вниз

          const speed = 0.005 * delta;
          rig.position.x += this.direction.x * speed;
          rig.position.z += this.direction.z * speed;
        }
      });

      // 3. ЛОГИКА СТРЕЛЬБЫ
      AFRAME.registerComponent('shooter-logic', {
        init: function () {
          this.el.addEventListener('triggerdown', () => {
            document.getElementById('snd-shot').components.sound.playSound();
            this.fire();
          });
        },
        fire: function () {
          const bullet = document.createElement('a-entity');
          bullet.setAttribute('mixin', 'bullet');
          
          const startPos = new THREE.Vector3();
          this.el.object3D.getWorldPosition(startPos);
          bullet.setAttribute('position', startPos);

          const dir = new THREE.Vector3(0, 0, -1);
          const worldQuat = new THREE.Quaternion();
          this.el.object3D.getWorldQuaternion(worldQuat);
          dir.applyQuaternion(worldQuat);

          this.el.sceneEl.appendChild(bullet);

          let life = 0;
          const move = () => {
            const p = bullet.getAttribute('position');
            bullet.setAttribute('position', {
              x: p.x + dir.x * 0.5, y: p.y + dir.y * 0.5, z: p.z + dir.z * 0.5
            });
            
            // Коллизии
            const enemies = document.querySelectorAll('.enemy');
            enemies.forEach(en => {
              if (bullet.object3D.position.distanceTo(en.object3D.position) < 0.8) {
                en.parentNode.removeChild(en);
                bullet.parentNode.removeChild(bullet);
                document.getElementById('snd-expl').components.sound.playSound();
                this.el.emit('enemy-killed');
                return;
              }
            });

            if (++life < 100 && bullet.parentNode) requestAnimationFrame(move);
            else if (bullet.parentNode) bullet.parentNode.removeChild(bullet);
          };
          move();
        }
      });

      // 4. ГЕНЕРАЦИЯ УРОВНЕЙ
      AFRAME.registerComponent('seth-game-logic', {
        init: function () {
          this.level = 1;
          this.enemies = 0;
          this.spawnLevel();
          this.el.addEventListener('enemy-killed', () => {
            this.enemies--;
            this.updateText();
            if (this.enemies <= 0) this.nextLevel();
          });
        },
        spawnLevel: function () {
          const container = document.getElementById('level-container');
          container.innerHTML = '';
          this.enemies = 0;
          const count = 5 + this.level;

          for (let i = 0; i < count; i++) {
            const en = document.createElement('a-entity');
            const pos = { x: (Math.random()-0.5)*30, y: 1.5, z: (Math.random()-0.5)*30 };
            if (Math.abs(pos.x) < 3 && Math.abs(pos.z) < 3) pos.z -= 10;
            
            en.setAttribute('geometry', 'primitive: octahedron; radius: 0.6');
            en.setAttribute('material', 'color: red; emissive: #300');
            en.setAttribute('position', pos);
            en.setAttribute('class', 'enemy');
            en.setAttribute('animation', 'property: rotation; to: 0 360 360; loop: true; dur: 3000');
            container.appendChild(en);
            this.enemies++;
          }
          
          // Стены
          for (let i = 0; i < 20; i++) {
            const wall = document.createElement('a-entity');
            wall.setAttribute('mixin', 'wall');
            wall.setAttribute('position', { x: (Math.random()-0.5)*40, y: 2, z: (Math.random()-0.5)*40 });
            if (Math.abs(wall.getAttribute('position').x) > 4) container.appendChild(wall);
          }
          this.updateText();
        },
        updateText: function() {
          document.getElementById('ui-text').setAttribute('value', `LEVEL: ${this.level}\nENEMIES: ${this.enemies}`);
        },
        nextLevel: function() {
          this.level++;
          this.updateText();
          setTimeout(() => this.spawnLevel(), 2000);
        }
      });
    </script>
  </body>
</html>
