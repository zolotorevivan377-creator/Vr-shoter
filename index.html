<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Shooter Fixed - Meta Quest</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene seth-game-logic renderer="foveationLevel: 2; antialias: true">
      
      <a-assets>
        <a-mixin id="wall" geometry="primitive: box; width: 4; height: 4; depth: 4" material="color: #333; roughness: 1"></a-mixin>
        <a-mixin id="bullet" geometry="primitive: sphere; radius: 0.05" material="color: #00ff00; emissive: #00ff00"></a-mixin>
        
        <audio id="shot-snd" src="https://cdn.freesound.org/previews/564/564756_12630654-lq.mp3" preload="auto"></audio>
        <audio id="expl-snd" src="https://cdn.freesound.org/previews/511/511484_10287532-lq.mp3" preload="auto"></audio>
      </a-assets>

      <a-sky color="#050505"></a-sky>
      <a-grid limits="50" color="#222"></a-grid>

      <a-entity id="rig" movement-controls="speed: 0.2; constrainToNavmesh: false">
        <a-entity id="camera" 
                  camera 
                  look-controls="pointerLockEnabled: true" 
                  position="0 1.6 0">
            
            <a-entity position="0 -0.3 -1">
                 <a-plane material="color: #000; opacity: 0.6" width="0.8" height="0.2"></a-plane>
                 <a-text id="ui-text" value="WAITING..." align="center" width="1.8" color="#00ff00"></a-text>
            </a-entity>
        </a-entity>

        <a-entity id="right-hand" 
                  oculus-touch-controls="hand: right" 
                  shooter-controls>
        </a-entity>

        <a-entity id="left-hand" oculus-touch-controls="hand: left"></a-entity>
      </a-entity>

      <a-entity id="level-container"></a-entity>

      <a-entity id="snd-shot" sound="src: #shot-snd; poolSize: 10; volume: 0.5"></a-entity>
      <a-entity id="snd-expl" sound="src: #expl-snd; poolSize: 10; volume: 0.7"></a-entity>

    </a-scene>

    <script>
      // ЛОГИКА ИГРЫ
      AFRAME.registerComponent('seth-game-logic', {
        init: function () {
          this.level = 1;
          this.enemiesCount = 0;
          this.generateLevel();
          
          this.el.addEventListener('enemy-down', () => {
            this.enemiesCount--;
            // Проигрываем звук взрыва
            document.querySelector('#snd-expl').components.sound.playSound();
            this.updateUI();
            if (this.enemiesCount <= 0) this.nextLevel();
          });
        },

        generateLevel: function () {
          const container = document.querySelector('#level-container');
          container.innerHTML = ''; 
          this.enemiesCount = 0;

          const size = 6 + this.level; 
          const spacing = 5;

          for (let x = -size; x < size; x++) {
            for (let z = -size; z < size; z++) {
              if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;

              if (Math.random() > 0.88) {
                let wall = document.createElement('a-entity');
                wall.setAttribute('mixin', 'wall');
                wall.setAttribute('position', `${x * spacing} 2 ${z * spacing}`);
                container.appendChild(wall);
              } 
              else if (Math.random() > 0.96) {
                this.createEnemy(x * spacing, 1.5, z * spacing);
                this.enemiesCount++;
              }
            }
          }
          this.updateUI(`LEVEL ${this.level}\nEnemies: ${this.enemiesCount}`);
        },

        createEnemy: function (x, y, z) {
          const enemy = document.createElement('a-entity');
          enemy.setAttribute('geometry', 'primitive: sphere; radius: 0.4');
          enemy.setAttribute('material', 'color: #ff0000; emissive: #440000; wireframe: true');
          enemy.setAttribute('position', `${x} ${y} ${z}`);
          enemy.setAttribute('class', 'enemy');
          // Враги пульсируют
          enemy.setAttribute('animation', 'property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 1000');
          document.querySelector('#level-container').appendChild(enemy);
        },

        updateUI: function (msg) {
          const text = document.querySelector('#ui-text');
          if (msg) text.setAttribute('value', msg);
          else text.setAttribute('value', `Level ${this.level}\nEnemies: ${this.enemiesCount}`);
        },

        nextLevel: function () {
          this.level++;
          this.updateUI("LEVEL COMPLETE\nGenerating next...");
          setTimeout(() => this.generateLevel(), 3000);
        }
      });

      // КОМПОНЕНТ СТРЕЛЬБЫ
      AFRAME.registerComponent('shooter-controls', {
        init: function () {
          // Слушаем нажатие курка
          this.el.addEventListener('triggerdown', () => {
            this.shoot();
          });
        },

        shoot: function () {
          // Звук
          const shotSnd = document.querySelector('#snd-shot');
          if (shotSnd.components.sound) shotSnd.components.sound.playSound();

          const bullet = document.createElement('a-entity');
          bullet.setAttribute('mixin', 'bullet');
          
          // Определяем позицию и направление выстрела из контроллера
          const position = new THREE.Vector3();
          this.el.object3D.getWorldPosition(position);
          bullet.setAttribute('position', position);

          const rotation = new THREE.Quaternion();
          this.el.object3D.getWorldQuaternion(rotation);
          
          const direction = new THREE.Vector3(0, 0, -1);
          direction.applyQuaternion(rotation);

          document.querySelector('a-scene').appendChild(bullet);

          const speed = 0.5;
          const startTime = Date.now();

          const moveBullet = () => {
            if (!bullet.parentNode) return;

            const curPos = bullet.getAttribute('position');
            bullet.setAttribute('position', {
              x: curPos.x + direction.x * speed,
              y: curPos.y + direction.y * speed,
              z: curPos.z + direction.z * speed
            });

            // Коллизии
            const enemies = document.querySelectorAll('.enemy');
            enemies.forEach(enemy => {
              const dist = bullet.object3D.position.distanceTo(enemy.object3D.position);
              if (dist < 0.6) {
                enemy.parentNode.removeChild(enemy);
                if (bullet.parentNode) bullet.parentNode.removeChild(bullet);
                this.el.emit('enemy-down');
              }
            });

            // Удаление старых пуль через 3 секунды
            if (Date.now() - startTime > 3000) {
              if (bullet.parentNode) bullet.parentNode.removeChild(bullet);
            } else {
              requestAnimationFrame(moveBullet);
            }
          };
          requestAnimationFrame(moveBullet);
        }
      });
    </script>
  </body>
</html>
