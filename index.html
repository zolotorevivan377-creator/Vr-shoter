<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Quest Shooter: Rogue-lite</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a-scene>
        <a-assets>
            <a-mixin id="bullet" geometry="primitive: sphere; radius: 0.05" material="color: #FFD700; emissive: #FFD700"></a-mixin>
            <a-mixin id="enemy-mesh" geometry="primitive: capsule; radius: 0.3; height: 1.6"></a-mixin>
        </a-assets>

        <a-entity id="env" environment="preset: starry; seed: 1; dressingAmount: 20"></a-entity>

        <a-entity id="rig" position="0 0 0">
            <a-camera id="camera" look-controls position="0 1.6 0">
                <a-text id="hud" value="Level: 1 | Enemies: 0" position="0 -0.5 -1" scale="0.5 0.5 0.5" align="center" color="#FFF"></a-text>
                <a-entity id="menu" position="0 0 -1.5">
                    <a-plane color="#222" width="1.5" height="1" opacity="0.9">
                        <a-text value="VR SHOOTER\n\nClick Trigger to Start" align="center" position="0 0 0.1"></a-text>
                    </a-plane>
                </a-entity>
            </a-camera>

            <a-entity id="leftHand" laser-controls="hand: left" raycaster="objects: .enemy; far: 0"></a-entity>
            <a-entity id="rightHand" laser-controls="hand: right" shooter-controller>
                <a-box size="0.1 0.1 0.3" position="0 0 -0.1" material="color: #444"></a-box>
            </a-entity>
        </a-entity>

        <a-entity id="enemies"></a-entity>
        <a-entity id="bullets"></a-entity>

        <a-entity id="snd-shoot" sound="src: url(https://cdn.aframe.io/360-video-example/guerrilla_sound_design_gun_shot.mp3); poolSize: 10; volume: 0.5"></a-entity>
    </a-scene>

    <script>
        let gameState = {
            level: 1,
            enemiesLeft: 0,
            playing: false,
            score: 0
        };

        // Логика стрельбы игрока
        AFRAME.registerComponent('shooter-controller', {
            init: function () {
                this.el.addEventListener('triggerdown', () => {
                    if (!gameState.playing) {
                        startGame();
                        return;
                    }
                    this.shoot();
                });
            },
            shoot: function () {
                const bullet = document.createElement('a-entity');
                bullet.setAttribute('mixin', 'bullet');
                
                // Позиция и направление
                const pos = new THREE.Vector3();
                this.el.object3D.getWorldPosition(pos);
                const dir = new THREE.Vector3(0, 0, -1);
                dir.applyQuaternion(this.el.object3D.getWorldQuaternion(new THREE.Quaternion()));

                bullet.setAttribute('position', pos);
                bullet.setAttribute('bullet-logic', { direction: dir });
                document.querySelector('#bullets').appendChild(bullet);
                
                document.querySelector('#snd-shoot').components.sound.stopSound();
                document.querySelector('#snd-shoot').components.sound.playSound();
                
                // Вибрация контроллера (Haptics)
                const gamepads = navigator.getGamepads();
                for (let gp of gamepads) {
                    if (gp && gp.hapticActuators && gp.hapticActuators[0]) {
                        gp.hapticActuators[0].pulse(0.6, 50);
                    }
                }
            }
        });

        // Логика полета пули и попадания
        AFRAME.registerComponent('bullet-logic', {
            schema: { direction: { type: 'vec3' }, speed: { default: 0.3 } },
            tick: function () {
                const pos = this.el.getAttribute('position');
                pos.x += this.data.direction.x * this.data.speed;
                pos.y += this.data.direction.y * this.data.speed;
                pos.z += this.data.direction.z * this.data.speed;
                this.el.setAttribute('position', pos);

                // Проверка дистанции до врагов (простой хитбокс)
                const enemies = document.querySelectorAll('.enemy');
                enemies.forEach(enemy => {
                    const enemyPos = enemy.getAttribute('position');
                    const dist = new THREE.Vector3(pos.x, pos.y, pos.z).distanceTo(new THREE.Vector3(enemyPos.x, enemyPos.y, enemyPos.z));
                    if (dist < 0.6) {
                        enemy.parentNode.removeChild(enemy);
                        this.el.parentNode.removeChild(this.el);
                        updateEnemyCount();
                    }
                });

                // Удаление при вылете за границы
                if (Math.abs(pos.z) > 40 || Math.abs(pos.x) > 40) {
                    if(this.el.parentNode) this.el.parentNode.removeChild(this.el);
                }
            }
        });

        // Логика поведения врага
        AFRAME.registerComponent('enemy-logic', {
            schema: { type: { default: 'chaser' }, speed: { default: 0.02 } },
            tick: function () {
                const playerPos = document.querySelector('#camera').object3D.position;
                const enemyPos = this.el.object3D.position;
                const dir = new THREE.Vector3().subVectors(playerPos, enemyPos).normalize();

                if (this.data.type === 'chaser') {
                    enemyPos.x += dir.x * this.data.speed;
                    enemyPos.z += dir.z * this.data.speed;
                    this.el.setAttribute('position', enemyPos);
                }

                // Враг "убивает" игрока при контакте
                const dist = new THREE.Vector3(enemyPos.x, 0, enemyPos.z).distanceTo(new THREE.Vector3(playerPos.x, 0, playerPos.z));
                if (dist < 0.5 && gameState.playing) {
                    gameOver();
                }
            }
        });

        function startGame() {
            gameState.playing = true;
            gameState.level = 1;
            document.querySelector('#menu').setAttribute('visible', false);
            generateLevel();
        }

        function generateLevel() {
            const container = document.querySelector('#enemies');
            container.innerHTML = '';
            
            // Настройка окружения под уровень
            const envs = ['forest', 'volcano', 'contact', 'egypt'];
            const randomEnv = envs[Math.floor(Math.random() * envs.length)];
            document.querySelector('#env').setAttribute('environment', 'preset', randomEnv);

            const count = 3 + (gameState.level * 2);
            for (let i = 0; i < count; i++) {
                const enemy = document.createElement('a-entity');
                const isShooter = Math.random() > 0.7;
                
                enemy.classList.add('enemy');
                enemy.setAttribute('mixin', 'enemy-mesh');
                enemy.setAttribute('material', 'color', isShooter ? '#FF4500' : '#8B0000');
                
                // Рандомный спавн вокруг игрока
                const angle = Math.random() * Math.PI * 2;
                const dist = 10 + Math.random() * 5;
                enemy.setAttribute('position', {
                    x: Math.cos(angle) * dist,
                    y: 0.8,
                    z: Math.sin(angle) * dist
                });

                enemy.setAttribute('enemy-logic', { 
                    type: isShooter ? 'shooter' : 'chaser',
                    speed: 0.01 + (gameState.level * 0.005)
                });
                
                container.appendChild(enemy);
            }
            gameState.enemiesLeft = count;
            updateHUD();
        }

        function updateEnemyCount() {
            gameState.enemiesLeft--;
            updateHUD();
            if (gameState.enemiesLeft <= 0) {
                gameState.level++;
                generateLevel();
            }
        }

        function updateHUD() {
            document.querySelector('#hud').setAttribute('value', `Level: ${gameState.level} | Enemies: ${gameState.enemiesLeft}`);
        }

        function gameOver() {
            gameState.playing = false;
            document.querySelector('#enemies').innerHTML = '';
            document.querySelector('#menu').setAttribute('visible', true);
            document.querySelector('#menu').querySelector('a-text').setAttribute('value', `GAME OVER\nReached Level: ${gameState.level}\n\nClick Trigger to Restart`);
        }
    </script>
</body>
</html>
