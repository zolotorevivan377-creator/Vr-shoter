<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Quest Debug Build</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
      // Глобальный флаг
      let isGameInitialized = false;

      AFRAME.registerComponent('world-manager', {
        init: function () {
          // Ждем нажатия курка на правом контроллере
          this.el.addEventListener('triggerdown', () => {
            if (!isGameInitialized) {
              this.createWorld();
              isGameInitialized = true;
              document.querySelector('#msg').setAttribute('visible', 'false');
            }
          });
        },
        createWorld: function () {
          const scene = this.el;
          
          // 1. Создаем врагов (Красные сферы)
          for (let i = 0; i < 5; i++) {
            let enemy = document.createElement('a-sphere');
            enemy.setAttribute('class', 'enemy');
            enemy.setAttribute('color', 'red');
            enemy.setAttribute('radius', '0.5');
            // Расставляем вокруг игрока
            let angle = (i / 5) * Math.PI * 2;
            let x = Math.cos(angle) * 5;
            let z = Math.sin(angle) * 5;
            enemy.setAttribute('position', {x: x, y: 1.5, z: z});
            scene.appendChild(enemy);
          }

          // 2. Создаем стены (Синие кубы)
          for (let i = 0; i < 8; i++) {
            let wall = document.createElement('a-box');
            wall.setAttribute('position', `${(Math.random()-0.5)*15} 1.5 ${(Math.random()-0.5)*15}`);
            wall.setAttribute('color', 'blue');
            wall.setAttribute('opacity', '0.5');
            scene.appendChild(wall);
          }
          console.log("Мир создан!");
        }
      });

      // Упрощенная стрельба
      AFRAME.registerComponent('simple-gun', {
        init: function () {
          this.el.addEventListener('triggerdown', () => {
            if (!isGameInitialized) return;
            
            let bullet = document.createElement('a-sphere');
            bullet.setAttribute('radius', '0.05');
            bullet.setAttribute('color', 'yellow');
            
            let pos = new THREE.Vector3();
            this.el.object3D.getWorldPosition(pos);
            bullet.setAttribute('position', pos);
            
            let dir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.el.object3D.quaternion);
            this.el.sceneEl.appendChild(bullet);

            let loop = setInterval(() => {
              let bPos = bullet.getAttribute('position');
              bullet.setAttribute('position', {
                x: bPos.x + dir.x * 0.3,
                y: bPos.y + dir.y * 0.3,
                z: bPos.z + dir.z * 0.3
              });
              
              // Проверка попадания
              document.querySelectorAll('.enemy').forEach(en => {
                let eP = en.getAttribute('position');
                if (new THREE.Vector3(bPos.x, bPos.y, bPos.z).distanceTo(eP) < 0.6) {
                  en.parentNode.removeChild(en);
                  bullet.parentNode.removeChild(bullet);
                  clearInterval(loop);
                }
              });
            }, 20);
            setTimeout(() => { if(bullet.parentNode) bullet.parentNode.removeChild(bullet); clearInterval(loop); }, 2000);
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene world-manager>
      <a-sky color="#111"></a-sky>
      <a-plane rotation="-90 0 0" width="50" height="50" color="#222"></a-plane>
      <a-grid></a-grid>

      <a-text id="msg" value="ENTER VR & PRESS TRIGGER" position="0 2 -3" align="center" color="yellow"></a-text>

      <a-entity id="rig">
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity oculus-touch-controls="hand: right" simple-gun></a-entity>
        <a-entity oculus-touch-controls="hand: left"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
