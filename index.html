<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Quest VR Shooter Lite</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene seth-logic>
        <a-assets>
            <a-mixin id="wall-buf" geometry="primitive: box; width: 3; height: 3; depth: 3" material="color: #444"></a-mixin>
            <a-mixin id="bullet-buf" geometry="primitive: sphere; radius: 0.07" material="color: #ff0; emissive: #ff0"></a-mixin>
        </a-assets>

        <a-sky color="#050505"></a-sky>
        <a-plane rotation="-90 0 0" width="100" height="100" color="#111"></a-plane>

        <a-entity id="rig" position="0 0 0">
            <a-entity id="head" camera look-controls position="0 1.6 0">
                <a-text id="hud" value="LOADING..." position="0 -0.4 -1" scale="0.4 0.4 0.4" align="center" color="#0f0"></a-text>
            </a-entity>

            <a-entity id="lhand" oculus-touch-controls="hand: left" move-logic></a-entity>
            <a-entity id="rhand" oculus-touch-controls="hand: right" shoot-logic></a-entity>
        </a-entity>

        <a-entity id="world"></a-entity>

    </a-scene>

    <script>
        // 1. ЛОГИКА ПЕРЕДВИЖЕНИЯ (ЛЕВЫЙ СТИК)
        AFRAME.registerComponent('move-logic', {
            init: function () {
                this.vel = {x: 0, z: 0};
                this.el.addEventListener('axismove', (e) => {
                    // На Quest стик обычно это оси 2 и 3
                    this.vel.x = e.detail.axis[2] || 0;
                    this.vel.z = e.detail.axis[3] || 0;
                });
            },
            tick: function (t, dt) {
                if (Math.abs(this.vel.x) < 0.1 && Math.abs(this.vel.z) < 0.1) return;
                
                const rig = document.getElementById('rig').object3D;
                const head = document.getElementById('head').object3D;
                
                // Двигаемся в сторону взгляда
                const angle = head.rotation.y;
                const speed = 0.004 * dt;
                
                rig.position.x += (this.vel.x * Math.cos(angle) + this.vel.z * Math.sin(angle)) * speed;
                rig.position.z += (this.vel.x * Math.sin(angle) - this.vel.z * Math.cos(angle)) * speed;
            }
        });

        // 2. ЛОГИКА СТРЕЛЬБЫ (ПРАВЫЙ КУРОК)
        AFRAME.registerComponent('shoot-logic', {
            init: function () {
                this.el.addEventListener('triggerdown', () => {
                    this.fire();
                });
            },
            fire: function () {
                const bullet = document.createElement('a-entity');
                bullet.setAttribute('mixin', 'bullet-buf');
                
                // Позиция выстрела
                const pos = new THREE.Vector3();
                this.el.object3D.getWorldPosition(pos);
                bullet.setAttribute('position', pos);

                // Направление
                const dir = new THREE.Vector3(0, 0, -1);
                const quat = new THREE.Quaternion();
                this.el.object3D.getWorldQuaternion(quat);
                dir.applyQuaternion(quat);

                this.el.sceneEl.appendChild(bullet);

                let dist = 0;
                const move = () => {
                    if (dist > 40 || !bullet.parentNode) {
                        if (bullet.parentNode) bullet.parentNode.removeChild(bullet);
                        return;
                    }
                    const bPos = bullet.getAttribute('position');
                    bullet.setAttribute('position', {
                        x: bPos.x + dir.x * 0.6,
                        y: bPos.y + dir.y * 0.6,
                        z: bPos.z + dir.z * 0.6
                    });
                    dist += 0.6;

                    // Проверка попадания
                    document.querySelectorAll('.enemy').forEach(en => {
                        if (bullet.object3D.position.distanceTo(en.object3D.position) < 0.7) {
                            en.parentNode.removeChild(en);
                            bullet.parentNode.removeChild(bullet);
                            document.querySelector('a-scene').emit('kill');
                        }
                    });
                    if (bullet.parentNode) requestAnimationFrame(move);
                };
                move();
            }
        });

        // 3. УПРАВЛЕНИЕ МИРОМ И УРОВНЯМИ
        AFRAME.registerComponent('seth-logic', {
            init: function () {
                this.level = 1;
                this.enemies = 0;
                this.makeLevel();
                
                this.el.addEventListener('kill', () => {
                    this.enemies--;
                    this.updateUI();
                    if (this.enemies <= 0) this.win();
                });
            },
            makeLevel: function () {
                const world = document.getElementById('world');
                world.innerHTML = '';
                this.enemies = 5 + this.level;

                // Создаем врагов
                for(let i=0; i<this.enemies; i++) {
                    const en = document.createElement('a-entity');
                    en.setAttribute('class', 'enemy');
                    en.setAttribute('geometry', 'primitive: box; width: 0.8; height: 0.8; depth: 0.8');
                    en.setAttribute('material', 'color: red; emissive: red');
                    en.setAttribute('position', `${(Math.random()-0.5)*30} 1.5 ${(Math.random()-0.5)*30}`);
                    world.appendChild(en);
                }

                // Создаем пару стен для ориентира
                for(let i=0; i<15; i++) {
                    const wall = document.createElement('a-entity');
                    wall.setAttribute('mixin', 'wall-buf');
                    wall.setAttribute('position', `${(Math.random()-0.5)*40} 1.5 ${(Math.random()-0.5)*40}`);
                    world.appendChild(wall);
                }
                this.updateUI();
            },
            updateUI: function() {
                document.getElementById('hud').setAttribute('value', `LEVEL: ${this.level}\nTARGETS: ${this.enemies}`);
            },
            win: function() {
                this.level++;
                document.getElementById('hud').setAttribute('value', "LEVEL COMPLETE!");
                setTimeout(() => this.makeLevel(), 2000);
            }
        });
    </script>
</body>
</html>
