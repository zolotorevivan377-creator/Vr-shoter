<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Shooter Pro - Meta Quest</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene seth-game-logic>
      <a-assets>
        <a-mixin id="wall" geometry="primitive: box; width: 4; height: 4; depth: 4" material="color: #333; roughness: 1"></a-mixin>
        <a-mixin id="bullet" geometry="primitive: sphere; radius: 0.05" material="color: #00ff00; emissive: #00ff00"></a-mixin>
        
        <audio id="shot-snd" src="https://cdn.freesound.org/previews/564/564756_12630654-lq.mp3" preload="auto"></audio>
        <audio id="expl-snd" src="https://cdn.freesound.org/previews/511/511484_10287532-lq.mp3" preload="auto"></audio>
      </a-assets>

      <a-sky color="#050505"></a-sky>
      <a-grid limits="50" abs-size="50" color="#222"></a-grid>

      <a-entity id="rig" movement-controls="speed: 0.15; fly: false">
        <a-entity id="camera" camera look-controls position="0 1.6 0">
            <a-entity position="0 -0.25 -1">
                 <a-plane material="color: black; opacity: 0.5" width="0.6" height="0.15"></a-plane>
                 <a-text id="ui-text" value="Loading..." align="center" width="1.5" color="#00ff00"></a-text>
            </a-entity>
        </a-camera>

        <a-entity id="right-hand" 
                  oculus-touch-controls="hand: right" 
                  laser-controls="hand: right"
                  raycaster="objects: .nothing"
                  shooter-controls>
        </a-entity>

        <a-entity id="left-hand" oculus-touch-controls="hand: left"></a-entity>
      </a-entity>

      <a-entity id="level-container"></a-entity>

      <a-entity id="sound-container">
          <a-entity id="snd-shot" sound="src: #shot-snd; poolSize: 5; volume: 0.5"></a-entity>
          <a-entity id="snd-expl" sound="src: #expl-snd; poolSize: 5; volume: 0.7"></a-entity>
      </a-entity>

    </a-scene>

    <script>
      AFRAME.registerComponent('seth-game-logic', {
        init: function () {
          this.level = 1;
          this.enemiesCount = 0;
          this.generateLevel();
          
          this.el.addEventListener('enemy-down', () => {
            this.enemiesCount--;
            document.querySelector('#snd-expl').components.sound.playSound();
            this.updateUI();
            if (this.enemiesCount <= 0) this.nextLevel();
          });
        },

        generateLevel: function () {
          const container = document.querySelector('#level-container');
          container.innerHTML = ''; 
          this.enemiesCount = 0;

          const size = 6; 
          const spacing = 4;

          for (let x = -size; x < size; x++) {
            for (let z = -size; z < size; z++) {
              // Исключаем стартовую зону игрока
              if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;

              if (Math.random() > 0.85) {
                let wall = document.createElement('a-entity');
                wall.setAttribute('mixin', 'wall');
                wall.setAttribute('position', `${x * spacing} 2 ${z * spacing}`);
                container.appendChild(wall);
              } 
              else if (Math.random() > 0.94) {
                this.createEnemy(x * spacing, 1.5, z * spacing);
                this.enemiesCount++;
              }
            }
          }
          this.updateUI(`LEVEL ${this.level}\nTarget: ${this.enemiesCount} drones`);
        },

        createEnemy: function (x, y, z) {
          const enemy = document.createElement('a-entity');
          enemy.setAttribute('geometry', 'primitive: torusKnot; radius: 0.4; radiusTubular: 0.05');
          enemy.setAttribute('material', 'color: #ff4400; emissive: #220000');
          enemy.setAttribute('position', `${x} ${y} ${z}`);
          enemy.setAttribute('class', 'enemy');
          enemy.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear');
          document.querySelector('#level-container').appendChild(enemy);
        },

        updateUI: function (msg) {
          const text = document.querySelector('#ui-text');
          if (msg) text.setAttribute('value', msg);
          else text.setAttribute('value', `Level ${this.level}\nEnemies: ${this.enemiesCount}`);
        },

        nextLevel: function () {
          this.level++;
          this.updateUI("CLEARED!\nNext Level Ready");
          setTimeout(() => this.generateLevel(), 2500);
        }
      });

      AFRAME.registerComponent('shooter-controls', {
        init: function () {
          this.el.addEventListener('triggerdown', () => {
            this.shoot();
          });
        },

        shoot: function () {
          // Звук выстрела
          document.querySelector('#snd-shot').components.sound.playSound();

          const bullet = document.createElement('a-entity');
          bullet.setAttribute('mixin', 'bullet');
          
          const worldPos = new THREE.Vector3();
          this.el.object3D.getWorldPosition(worldPos);
          bullet.setAttribute('position', worldPos);

          const direction = new THREE.Vector3(0, 0, -1);
          direction.applyQuaternion(this.el.object3D.getWorldRotation(new THREE.Quaternion()));

          document.querySelector('a-scene').appendChild(bullet);

          const interval = setInterval(() => {
            const pos = bullet.getAttribute('position');
            bullet.setAttribute('position', {
              x: pos.x + direction.x * 0.4,
              y: pos.y + direction.y * 0.4,
              z: pos.z + direction.z * 0.4
            });

            const enemies = document.querySelectorAll('.enemy');
            enemies.forEach(enemy => {
              if (bullet.object3D.position.distanceTo(enemy.object3D.position) < 0.7) {
                enemy.parentNode.removeChild(enemy);
                bullet.parentNode.removeChild(bullet);
                clearInterval(interval);
                this.el.emit('enemy-down');
              }
            });

            if (bullet.object3D.position.length() > 50) {
              if (bullet.parentNode) bullet.parentNode.removeChild(bullet);
              clearInterval(interval);
            }
          }, 10);
        }
      });
    </script>
  </body>
</html>
